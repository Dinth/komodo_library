x-versions:
  bunkerm: &bunkerm-version "bunkeriot/bunkerm:latest"
  mqtt-explorer: &mqtt-explorer-version "smeagolworms4/mqtt-explorer:latest"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mqtt-explorer:
    image: *mqtt-explorer-version
    container_name: mqtt-explorer
    hostname: mqtt-explorer
    ipc: private
    restart: unless-stopped
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256M
    ports:
      - "4000:4000/tcp"
    volumes:
      - "/opt/docker/bunkerm/mqtt-explorer_config:/mqtt-explorer/config"
    networks:
      - bunkerm
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.display.name: "MQTT Explorer"
      wud.display.icon: "sh-bunkerm"

  bunkerm:
    image: *bunkerm-version
    container_name: bunkerm
    hostname: bunkerm
    ipc: private
    restart: unless-stopped
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256M
    environment:
      HOST_ADDRESS: "10.10.1.13"
    ports:
      - "1900:1900"
      - "2000:2000"
    volumes:
      - "/opt/docker/bunkerm/bunkerm_data:/var/lib/mosquitto"
      - "/opt/docker/bunkerm/bunkerm_config:/etc/mosquitto"
      - "/opt/docker/bunkerm/bunkerm_auth:/data"
    networks:
      - bunkerm
    logging: *default-logging
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "BunkerM"
      homepage.icon: "sh-bunkerm.png"
      homepage.href: "http://10.10.1.13:2000"
      homepage.description: "MQTT broker and interface"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.display.name: "BunkerM"
      wud.display.icon: "sh:bunkerm"
      wud.link.template: "https://github.com/bunkeriot/BunkerM/releases/v$${major}.$${minor}.$${patch}"

networks:
  bunkerm:
    name: bunkerm
    driver: bridge
