x-versions:
  backblaze: &backblaze-version "tessypowder/backblaze-personal-wine:ubuntu22"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  backblaze-personal-wine:
    image: *backblaze-version
    container_name: backblaze-personal-wine
    hostname: backblaze-personal-wine
    ipc: private
    restart: unless-stopped
    working_dir: /tmp
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
      - DAC_OVERRIDE
      - FSETID
      - FOWNER
      - MKNOD
      - KILL
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2G
    command: ['/init']
    environment:
      UMASK: "0022"
      LANG: "en_GB.UTF-8"
      KEEP_APP_RUNNING: "0"
      APP_NICENESS: "1"
      CONTAINER_DEBUG: "0"
      DISPLAY_WIDTH: "900"
      DISPLAY_HEIGHT: "700"
      WEB_LISTENING_PORT: "5800"
      VNC_LISTENING_PORT: "5900"
      VNC_PASSWORD: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5800"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - 5800:5800/tcp
    volumes:
      - /opt/docker/backblaze-personal-wine/backblaze_data:/config
      - /Data:/storage
    networks:
      - backblaze-personal-wine
    logging: *default-logging
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Backblaze Backup"
      homepage.icon: "sh-backblaze.png"
      homepage.href: "http://10.10.1.13:5800"
      homepage.description: "Backblaze external backups"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: '^\d+\.\d+\$$'
      wud.link.template: "https://github.com/JonathanTreffler/backblaze-personal-wine-container/releases/tag/v${major}.${minor}"
      wud.display.name: "Blackblaze"
      wud.display.icon: "sh-backblaze"

networks:
  backblaze-personal-wine:
    name: backblaze-personal-wine
    driver: bridge
    external: false
