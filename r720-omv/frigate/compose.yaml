x-versions:
  frigate: &frigate-version "ghcr.io/blakeblackshear/frigate:0.17.2-tensorrt"
  whoami: &whoami-version "traefik/whoami:v1.11.0"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  frigate:
    image: *frigate-version
    container_name: frigate
    hostname: frigate
    ipc: private
    restart: unless-stopped
    entrypoint: ['/init']
    working_dir: /opt/frigate
    # NOTE: privileged required for GPU/device access
    privileged: true
    runtime: nvidia
    shm_size: "16gb"
    mem_limit: 32G
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - label=disable
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute,utility,video]
    environment:
      PLUS_API_KEY: "${FRIGATE_PLUS_API_KEY}"
      USE_FP16: "false"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
      TOKENIZERS_PARALLELISM: "true"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
      OPENCV_FFMPEG_LOGLEVEL: "8"
      OPENCV_LOG_LEVEL: "FATAL"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - 5000:5000/tcp
      - 1984:1984/tcp
      - 8554:8554/tcp
      - 8555:8555/tcp
      - 8555:8555/udp
      - 8971:8971/tcp
    volumes:
      - /frigate-pool/recordings:/media/frigate
      - /dev/bus/usb:/dev/bus/usb
      - /etc/localtime:/etc/localtime:ro
      - /opt/docker/frigate/frigate_config:/config
      - /opt/docker/frigate/frigate_storage/frigate.db:/media/frigate/frigate.db
      - /opt/docker/frigate/frigate_storage/frigate.db-shm:/media/frigate/frigate.db-shm
      - /opt/docker/frigate/frigate_storage/frigate.db-wal:/media/frigate/frigate.db-wal
      - /opt/docker/frigate/frigate_storage/backup.db:/media/frigate/backup.db
    tmpfs:
      - /tmp:size=4G,mode=1777
    networks:
      - frigate
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      # Router for CF Access authenticated users (WARP org) - gets 1FA via trusted IP
      traefik.http.routers.frigate-cfaccess.entrypoints: websecure
      traefik.http.routers.frigate-cfaccess.rule: Host(`cctv.${DOMAIN_NAME}`) && HeaderRegexp(`Cf-Access-Jwt-Assertion`, `.+`)
      traefik.http.routers.frigate-cfaccess.priority: "110"
      traefik.http.routers.frigate-cfaccess.tls: "true"
      traefik.http.routers.frigate-cfaccess.tls.certresolver: letsencrypt
      traefik.http.routers.frigate-cfaccess.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.frigate-cfaccess.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.frigate-cfaccess.middlewares: "cf-access-auth@file,set-cfaccess-trusted-ip@file,secHeaders@file,authelia-auth@docker"
      traefik.http.routers.frigate-cfaccess.service: frigate
      # Default router for non-CF-Access traffic (local network or external) - normal auth flow
      traefik.http.routers.frigate.entrypoints: websecure
      traefik.http.routers.frigate.rule: Host(`cctv.${DOMAIN_NAME}`)
      traefik.http.routers.frigate.priority: "100"
      traefik.http.routers.frigate.tls: "true"
      traefik.http.routers.frigate.tls.certresolver: letsencrypt
      traefik.http.routers.frigate.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.frigate.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.frigate.middlewares: "cloudflarewarp@file,secHeaders@file,authelia-auth@docker"
      traefik.http.services.frigate.loadbalancer.server.port: "8971"
      traefik.docker.network: "traefik"
      homepage.group: "Home"
      homepage.name: "Frigate"
      homepage.icon: "frigate.png"
      homepage.href: "https://cctv.${DOMAIN_NAME}"
      homepage.siteMonitor: "https://cctv.${DOMAIN_NAME}"
      homepage.description: "CCTV NVR"
      homepage.widget.type: "frigate"
      homepage.widget.url: "http://10.10.1.13:8971"
      homepage.widget.enableRecentEvents: "true"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: '^\d+\.\d+\.\d+\-tensorrt$$'
      wud.link.template: "https://github.com/blakeblackshear/frigate/releases/tag/v$${major}.$${minor}.$${patch}"
      wud.display.name: "Frigate"
      wud.display.icon: "mdi:cctv"

  # Temporary debug service to see headers - REMOVE AFTER DEBUGGING
  debug-headers:
    image: *whoami-version
    container_name: frigate-debug-headers
    ipc: private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 32M
    networks:
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      # 1. Raw headers - no middlewares
      traefik.http.routers.debug-raw.entrypoints: websecure
      traefik.http.routers.debug-raw.rule: Host(`cctv.${DOMAIN_NAME}`) && Path(`/debug/raw`)
      traefik.http.routers.debug-raw.priority: "200"
      traefik.http.routers.debug-raw.tls: "true"
      traefik.http.routers.debug-raw.middlewares: "secHeaders@file"
      # 2. With cloudflarewarp middleware
      traefik.http.routers.debug-warp.entrypoints: websecure
      traefik.http.routers.debug-warp.rule: Host(`cctv.${DOMAIN_NAME}`) && Path(`/debug/warp`)
      traefik.http.routers.debug-warp.priority: "200"
      traefik.http.routers.debug-warp.tls: "true"
      traefik.http.routers.debug-warp.middlewares: "cloudflarewarp@file,secHeaders@file"
      # 3. With cf-access-auth (optional) - see X-Auth-User header if JWT valid
      traefik.http.routers.debug-cfauth.entrypoints: websecure
      traefik.http.routers.debug-cfauth.rule: Host(`cctv.${DOMAIN_NAME}`) && Path(`/debug/cfauth`)
      traefik.http.routers.debug-cfauth.priority: "200"
      traefik.http.routers.debug-cfauth.tls: "true"
      traefik.http.routers.debug-cfauth.middlewares: "cloudflarewarp@file,cf-access-auth@file,secHeaders@file"
      # 4. With trusted IP override (simulates what CF Access users will see)
      traefik.http.routers.debug-trusted.entrypoints: websecure
      traefik.http.routers.debug-trusted.rule: Host(`cctv.${DOMAIN_NAME}`) && Path(`/debug/trusted`)
      traefik.http.routers.debug-trusted.priority: "200"
      traefik.http.routers.debug-trusted.tls: "true"
      traefik.http.routers.debug-trusted.middlewares: "cf-access-required@file,set-cfaccess-trusted-ip@file,secHeaders@file"
      traefik.http.services.debug-headers.loadbalancer.server.port: "80"
      traefik.docker.network: "traefik"

networks:
  frigate:
    name: frigate
    driver: bridge
    external: false
  traefik:
    external: true
