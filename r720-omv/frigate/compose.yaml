x-versions:
  frigate: &frigate-version "ghcr.io/blakeblackshear/frigate:0.17.2-tensorrt"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  frigate:
    image: *frigate-version
    container_name: frigate
    hostname: frigate
    ipc: private
    restart: unless-stopped
    entrypoint: ['/init']
    working_dir: /opt/frigate
    # No privileged: it bypasses the nvidia runtime hook and lets the container
    # see ALL GPUs (CUDA then picks the faster RTX 5000), defeating the device
    # pin below. runtime:nvidia + the cap_add set + NVIDIA_VISIBLE_DEVICES give
    # GPU access non-privileged, so the device_ids pin actually restricts to GPU 0.
    runtime: nvidia
    shm_size: "16gb"
    mem_limit: 32G
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_ADMIN
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - label=disable
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Pin Frigate to GPU 0 (Tesla T4); leave GPU 1 (RTX 5000) free.
              # By UUID so it survives device re-enumeration across reboots.
              device_ids: ["GPU-993cb9a5-03ef-b0c5-0a88-db2d62ecd361"]
              capabilities: [compute,utility,video]
    environment:
      PLUS_API_KEY: "${FRIGATE_PLUS_API_KEY}"
      USE_FP16: "false"
      NVIDIA_VISIBLE_DEVICES: "GPU-993cb9a5-03ef-b0c5-0a88-db2d62ecd361"
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
      TOKENIZERS_PARALLELISM: "true"
      TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
      OPENCV_FFMPEG_LOGLEVEL: "8"
      OPENCV_LOG_LEVEL: "FATAL"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - 5000:5000/tcp
      - 1984:1984/tcp
      - 8554:8554/tcp
      - 8555:8555/tcp
      - 8555:8555/udp
      - 8971:8971/tcp
    volumes:
      - type: bind
        source: /frigate-pool/recordings
        target: /media/frigate
        bind:
          create_host_path: false
      - /etc/localtime:/etc/localtime:ro
      - /opt/docker/frigate/frigate_config:/config
      - /opt/docker/frigate/frigate_storage/frigate.db:/media/frigate/frigate.db
      - /opt/docker/frigate/frigate_storage/frigate.db-shm:/media/frigate/frigate.db-shm
      - /opt/docker/frigate/frigate_storage/frigate.db-wal:/media/frigate/frigate.db-wal
      - /opt/docker/frigate/frigate_storage/backup.db:/media/frigate/backup.db
    tmpfs:
      - /tmp:size=4G,mode=1777
    networks:
      - frigate
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      traefik.http.routers.frigate.entrypoints: websecure
      traefik.http.routers.frigate.rule: Host(`cctv.${DOMAIN_NAME}`)
      traefik.http.routers.frigate.tls: "true"
      traefik.http.routers.frigate.tls.certresolver: letsencrypt
      traefik.http.routers.frigate.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.frigate.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.frigate.middlewares: "secHeaders@file,authelia-auth@docker"
      #traefik.http.services.frigate.loadbalancer.server.port: "8971"
      traefik.http.services.frigate.loadbalancer.server.port: "5000"
      traefik.docker.network: "traefik"
      homepage.group: "Home"
      homepage.name: "Frigate"
      homepage.icon: "frigate.png"
      homepage.href: "https://cctv.${DOMAIN_NAME}"
      homepage.siteMonitor: "https://cctv.${DOMAIN_NAME}"
      homepage.description: "CCTV NVR"
      homepage.widget.type: "frigate"
      homepage.widget.url: "http://10.10.1.13:8971"
      homepage.widget.enableRecentEvents: "true"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: '^\d+\.\d+\.\d+\-tensorrt$$'
      wud.link.template: "https://github.com/blakeblackshear/frigate/releases/tag/v$${major}.$${minor}.$${patch}"
      wud.display.name: "Frigate"
      wud.display.icon: "mdi:cctv"


networks:
  frigate:
    name: frigate
    driver: bridge
    external: false
  traefik:
    external: true
