x-versions:
  homepage: &homepage-version "ghcr.io/gethomepage/homepage:v1.12.1"
  socket-proxy: &socket-proxy-version "wollomatic/socket-proxy:1.11.4"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-homepage-common: &homepage-common
  image: *homepage-version
  ipc: private
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - SETGID
    - SETUID
  mem_limit: 256M
  environment:
    HOMEPAGE_ALLOWED_HOSTS: "fp.${DOMAIN_NAME},10.10.1.13:3008,10.10.1.13:3018"
    PUID: "${DOCKER_PUID}"
    PGID: "${DOCKER_PGID}"
  logging: *default-logging
  depends_on:
    - homepage-socket-proxy
  networks:
    - homepage
    - traefik

services:
  homepage-socket-proxy:
    image: *socket-proxy-version
    container_name: homepage-socket-proxy
    ipc: private
    command:
      - '-loglevel=debug'
      - '-allowfrom=homepage-michal,homepage-paulina'
      - '-listenip=0.0.0.0'
      - '-allowGET=/(version|containers/.*)'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - Homepage'
      wud.display.icon: 'mdi:connection'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homepage

  homepage-michal:
    <<: *homepage-common
    container_name: homepage-michal
    hostname: homepage-michal
    ports:
      - 3008:3000
    volumes:
      - /opt/docker/homepage/homepage_config_michal:/app/config
    labels:
      # --- Traefik routing for michal (highest priority) ---
      traefik.enable: "true"
      traefik.http.routers.homepage-michal.rule: "Host(`fp.${DOMAIN_NAME}`) && HeaderRegexp(`Remote-User`, `^michal$$`)"
      traefik.http.routers.homepage-michal.priority: "110"
      traefik.http.routers.homepage-michal.entrypoints: "websecure"
      traefik.http.routers.homepage-michal.tls: "true"
      traefik.http.routers.homepage-michal.tls.certresolver: "letsencrypt"
      traefik.http.routers.homepage-michal.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.homepage-michal.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.homepage-michal.middlewares: "secHeaders@file"
      traefik.http.routers.homepage-michal.service: "homepage-michal"
      traefik.http.services.homepage-michal.loadbalancer.server.port: "3000"
      # --- Default fallback router (lowest priority) ---
      traefik.http.routers.homepage-default.rule: "Host(`fp.${DOMAIN_NAME}`)"
      traefik.http.routers.homepage-default.priority: "100"
      traefik.http.routers.homepage-default.entrypoints: "websecure"
      traefik.http.routers.homepage-default.tls: "true"
      traefik.http.routers.homepage-default.tls.certresolver: "letsencrypt"
      traefik.http.routers.homepage-default.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.homepage-default.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.homepage-default.middlewares: "secHeaders@file,authelia-auth@docker"
      traefik.http.routers.homepage-default.service: "homepage-michal"
      # --- WUD labels ---
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/gethomepage/homepage/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'Homepage - Michal'
      wud.display.icon: 'sh:homepage'

  homepage-paulina:
    <<: *homepage-common
    container_name: homepage-paulina
    hostname: homepage-paulina
    ports:
      - 3018:3000
    volumes:
      - /opt/docker/homepage/homepage_config_paulina:/app/config
    labels:
      # --- Traefik routing for paulina ---
      traefik.enable: "true"
      traefik.http.routers.homepage-paulina.rule: "Host(`fp.${DOMAIN_NAME}`) && HeaderRegexp(`Remote-User`, `^paulina$$`)"
      traefik.http.routers.homepage-paulina.priority: "110"
      traefik.http.routers.homepage-paulina.entrypoints: "websecure"
      traefik.http.routers.homepage-paulina.tls: "true"
      traefik.http.routers.homepage-paulina.tls.certresolver: "letsencrypt"
      traefik.http.routers.homepage-paulina.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.homepage-paulina.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.homepage-paulina.middlewares: "secHeaders@file"
      traefik.http.routers.homepage-paulina.service: "homepage-paulina"
      traefik.http.services.homepage-paulina.loadbalancer.server.port: "3000"
      # --- WUD labels ---
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/gethomepage/homepage/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'Homepage - Paulina'
      wud.display.icon: 'sh:homepage'

networks:
  homepage:
    name: homepage
    driver: bridge
    external: false
  traefik:
    external: true
