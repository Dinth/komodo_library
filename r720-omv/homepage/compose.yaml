x-versions:
  homepage: &homepage-version "ghcr.io/gethomepage/homepage:v1.13.2"
  socket-proxy: &socket-proxy-version "wollomatic/socket-proxy:1.12.2"
  selector: &selector-version "nginxinc/nginx-unprivileged:1.27-alpine"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Per-user Homepage boards on a SINGLE hostname (fp.${DOMAIN_NAME}).
#
# Homepage is not multi-user, so each board is its own container. A single
# Traefik router fronts fp.${DOMAIN_NAME} behind Authelia forward-auth; the
# homepage-selector (nginx) then picks the right backend from the *trusted*
# Remote-User header that Authelia injects. Routing on Remote-User is safe here
# (unlike the old per-router HeaderRegexp design) because authelia-auth runs
# first and overwrites any client-supplied value from the session, and the
# secHeaders middleware strips inbound Remote-* headers. Add a user = add one
# map line in the `homepage_selector` config + one backend container.
x-homepage-common: &homepage-common
  image: *homepage-version
  ipc: private
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - SETGID
    - SETUID
  mem_limit: 256M
  environment:
    HOMEPAGE_ALLOWED_HOSTS: "fp.${DOMAIN_NAME},10.10.1.13:3008,10.10.1.13:3018"
    PUID: "${DOCKER_PUID}"
    PGID: "${DOCKER_PGID}"
  logging: *default-logging
  depends_on:
    - homepage-socket-proxy
  # Internal-only backends now: reached by the selector over the homepage
  # network, no longer on the traefik network and no Traefik routers of their own.
  networks:
    - homepage

services:
  homepage-socket-proxy:
    image: *socket-proxy-version
    container_name: homepage-socket-proxy
    ipc: private
    command:
      - '-loglevel=debug'
      - '-allowfrom=homepage-michal,homepage-paulina'
      - '-listenip=0.0.0.0'
      - '-allowGET=/(version|containers/.*)'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - Homepage'
      wud.display.icon: 'mdi:connection'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homepage

  # Single public entrypoint for fp.${DOMAIN_NAME}. Authelia authenticates and
  # injects Remote-User; nginx forwards to the matching board container.
  homepage-selector:
    image: *selector-version
    container_name: homepage-selector
    hostname: homepage-selector
    ipc: private
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 64M
    configs:
      - source: homepage_selector
        target: /etc/nginx/conf.d/default.conf
    tmpfs:
      - /tmp
      - /var/cache/nginx
    depends_on:
      - homepage-michal
      - homepage-paulina
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - homepage
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.homepage.rule: "Host(`fp.${DOMAIN_NAME}`)"
      traefik.http.routers.homepage.entrypoints: "websecure"
      traefik.http.routers.homepage.tls: "true"
      traefik.http.routers.homepage.tls.certresolver: "letsencrypt"
      traefik.http.routers.homepage.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.homepage.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.homepage.middlewares: "secHeaders@file,authelia-auth@docker"
      traefik.http.services.homepage.loadbalancer.server.port: "8080"
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+\-alpine$$'
      wud.link.template: 'https://github.com/nginx/nginx/releases'
      wud.display.name: 'Homepage - Selector'
      wud.display.icon: 'sh:nginx'

  homepage-michal:
    <<: *homepage-common
    container_name: homepage-michal
    hostname: homepage-michal
    ports:
      - 3008:3000
    volumes:
      - /opt/docker/homepage/homepage_config_michal:/app/config
    labels:
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/gethomepage/homepage/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'Homepage - Michal'
      wud.display.icon: 'sh:homepage'

  homepage-paulina:
    <<: *homepage-common
    container_name: homepage-paulina
    hostname: homepage-paulina
    ports:
      - 3018:3000
    volumes:
      - /opt/docker/homepage/homepage_config_paulina:/app/config
    labels:
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/gethomepage/homepage/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'Homepage - Paulina'
      wud.display.icon: 'sh:homepage'

configs:
  # nginx picks the board from the Authelia-injected Remote-User. $$ escapes the
  # leading $ so Komodo/Compose passes nginx variables through literally.
  homepage_selector:
    content: |
      map $$http_upgrade $$connection_upgrade {
          default upgrade;
          ''      close;
      }
      map $$http_remote_user $$board {
          default "";
          michal  "homepage-michal:3000";
          paulina "homepage-paulina:3000";
      }
      server {
          listen 8080;
          resolver 127.0.0.11 valid=30s ipv6=off;

          location = /healthz {
              access_log off;
              add_header Content-Type text/plain;
              return 200 "ok\n";
          }

          location / {
              # Unknown / unmapped user -> 403 (Remote-User is trusted: set by
              # authelia-auth, with client values stripped by secHeaders).
              if ($$board = "") { return 403; }
              proxy_pass http://$$board$$request_uri;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Upgrade $$http_upgrade;
              proxy_set_header Connection $$connection_upgrade;
          }
      }

networks:
  homepage:
    name: homepage
    driver: bridge
    external: false
  traefik:
    external: true
