x-versions:
  socket-proxy: &socket-proxy-version "wollomatic/socket-proxy:1.12.3"
  wud: &wud-version "getwud/wud:8.3.0"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  wud-socket-proxy:
    image: *socket-proxy-version
    ipc: private
    command:
      - '-loglevel=info'
      - '-allowfrom=10.10.1.13/32,10.10.1.11/32,10.10.10.10/32,wud'
      - '-listenip=0.0.0.0'
      - '-allowGET=/(v[0-9.]+/)?(containers/.*|images/.*|events|info|version)'
      - '-allowPOST=/(containers/.*|images/.*)'
      - '-allowDELETE=/(containers/.*|images/.*)'
      - '-allowHEAD=/_ping'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
      - '-allowhealthcheck'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - wud
    logging: *default-logging
    ports:
      - "10.10.1.13:2377:2375"
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - WUD'
      wud.display.icon: 'mdi:connection'

  wud:
    image: *wud-version
    container_name: wud
    ipc: private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      TZ: "${TZ}"
      WUD_WATCHER_R720OMV_HOST: wud-socket-proxy
      WUD_WATCHER_R720OMV_PORT: "2375"
      WUD_WATCHER_R720OMV_WATCHALL: "true"
      WUD_WATCHER_R720OMV_SOCKET: "tcp://wud-socket-proxy:2375"
      WUD_WATCHER_R720OMV_WATCHEVENTS: "false"
      WUD_WATCHER_R720OMV_CRON: '0 1 * * *'
      WUD_WATCHER_R230NIXOS_HOST: 10.10.1.12
      WUD_WATCHER_R230NIXOS_PORT: "2377"
      WUD_WATCHER_R230NIXOS_WATCHALL: "true"
      WUD_WATCHER_R230NIXOS_SOCKET: "tcp://10.10.1.12:2377"
      WUD_WATCHER_R230NIXOS_WATCHEVENTS: "false"
      WUD_WATCHER_R230NIXOS_CRON: '0 1 * * *'
      WUD_SERVER_FEATURE_DELETE: "false"
      WUD_LOG_LEVEL: "debug"
      WUD_REGISTRY_HUB_LOGIN: "${WUD_DOCKERHUB_USER}"
      WUD_REGISTRY_HUB_TOKEN: "${WUD_DOCKERHUB_TOKEN}"
      WUD_REGISTRY_GHCR_PRIVATE_USERNAME: "${ADMIN_EMAIL}"
      WUD_REGISTRY_GHCR_PRIVATE_TOKEN: "${WUD_GHCR_TOKEN}"
      WUD_REGISTRY_LSCR_PRIVATE_USERNAME: "${ADMIN_EMAIL}"
      WUD_REGISTRY_LSCR_PRIVATE_TOKEN: "${WUD_GHCR_TOKEN}"
      WUD_REGISTRY_CUSTOM_BRICKTRACKER_URL: "https://gitea.baerentsen.space"
      # Signal notification on update via WUD's native command trigger. The WUD
      # image ships curl (its healthcheck uses it) and this service is on the
      # signal-rest-api network, so it POSTs the JSON body /v2/send actually
      # expects. The old http trigger crammed number/recipients/message into a GET
      # query string, which failed WUD's URI validation (raw spaces) and signal-
      # rest-api never accepts anyway (POST JSON only). $$ escapes compose so the
      # inner ${..} are expanded by the container shell at trigger time.
      SIGNAL_PHONE_NUMBER: "${SIGNAL_PHONE_NUMBER}"
      SIGNAL_TECH_ID: "${SIGNAL_TECH_ID}"
      WUD_TRIGGER_COMMAND_SIGNAL_AUTO: "true"
      WUD_TRIGGER_COMMAND_SIGNAL_CMD: 'curl -sS -m 15 -X POST http://signal-rest-api:8080/v2/send -H "Content-Type: application/json" -d "{\"message\":\"WUD: $${name} update available: $${update_kind_local_value} -> $${update_kind_remote_value}\",\"number\":\"$${SIGNAL_PHONE_NUMBER}\",\"recipients\":[\"$${SIGNAL_TECH_ID}\"]}"'
      WUD_AUTH_OIDC_AUTHELIA_DISCOVERY: "https://id.${DOMAIN_NAME}/.well-known/openid-configuration"
      WUD_AUTH_OIDC_AUTHELIA_CLIENTID: "my-wud-client-id"
      WUD_AUTH_OIDC_AUTHELIA_CLIENTSECRET: "${WUD_OIDC_CLIENT_SECRET}"
      WUD_AUTH_OIDC_AUTHELIA_REDIRECT: "true"
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Pin id.* to Traefik on the LAN so WUD's startup OIDC discovery + back-channel
    # token calls never depend on external DNS / NAT-reflection. Without this the
    # discovery fetch fails intermittently on restart and WUD drops the OIDC button,
    # leaving an empty login page (no basic-auth fallback is configured).
    extra_hosts:
      - "id.${DOMAIN_NAME}:10.10.1.13"
    depends_on:
      wud-socket-proxy:
        condition: service_healthy
    volumes:
      - /opt/docker/wud/wud_store:/store
      - /etc/localtime:/etc/localtime:ro
      - /etc/komodo/stacks:/docker
    networks:
      - wud
      - signal-rest-api
      - traefik
    logging: *default-logging
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Whats up Docker?"
      homepage.icon: "sh-whats-up-docker.png"
      homepage.href: "https://wud.${DOMAIN_NAME}"
      homepage.description: "Docker updates manager"
      homepage.siteMonitor: "https://wud.${DOMAIN_NAME}"
      traefik.enable: "true"
      traefik.http.routers.wud.rule: "Host(`wud.${DOMAIN_NAME}`)"
      traefik.http.routers.wud.entrypoints: "websecure"
      traefik.http.routers.wud.tls: "true"
      traefik.http.routers.wud.tls.certresolver: "letsencrypt"
      traefik.http.routers.wud.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.wud.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.wud.middlewares: "secHeaders@file,lan-only@file"
      traefik.http.services.wud.loadbalancer.server.port: "3000"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://getwud.github.io/wud/#/changelog/?id=_$${major}$${minor}$${patch}"
      wud.display.name: "Whats Up Docker?"
      wud.display.icon: "sh:wud"

networks:
  wud:
    name: wud
    driver: bridge
    external: false
  signal-rest-api:
    external: true
  traefik:
    external: true
