x-versions:
  socket-proxy: &socket-proxy-version "wollomatic/socket-proxy:1.11.3"
  wud: &wud-version "getwud/wud:8.2.2"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  wud-socket-proxy:
    image: *socket-proxy-version
    ipc: private
    command:
      - '-loglevel=info'
      - '-allowfrom=wud'
      - '-listenip=0.0.0.0'
      - '-allowGET=/(containers/.*|images/.*|events|info|version)'
      - '-allowPOST=/(containers/.*|images/.*)'
      - '-allowDELETE=/(containers/.*|images/.*)'
      - '-allowHEAD=/_ping'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
      - '-allowhealthcheck'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - wud
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - WUD'
      wud.display.icon: 'mdi:connection'

  wud:
    image: *wud-version
    container_name: wud
    ipc: private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      TZ: "${TZ}"
      WUD_WATCHER_R720OMV_HOST: wud-socket-proxy
      WUD_WATCHER_R720OMV_PORT: "2375"
      WUD_WATCHER_R720OMV_WATCHALL: "true"
      WUD_WATCHER_R720OMV_SOCKET: "tcp://wud-socket-proxy:2375"
      WUD_WATCHER_R720OMV_WATCHEVENTS: "false"
      WUD_WATCHER_R720OMV_CRON: '0 1 * * *'
      WUD_SERVER_FEATURE_DELETE: "false"
      WUD_LOG_LEVEL: "debug"
      WUD_REGISTRY_GHCR_PRIVATE_USERNAME: "${ADMIN_EMAIL}"
      WUD_REGISTRY_GHCR_PRIVATE_TOKEN: "${WUD_GHCR_TOKEN}"
      WUD_REGISTRY_LSCR_PRIVATE_USERNAME: "${ADMIN_EMAIL}"
      WUD_REGISTRY_LSCR_PRIVATE_TOKEN: "${WUD_GHCR_TOKEN}"
      WUD_REGISTRY_GITEA_BRICKTRACKER_URL: "https://gitea.baerentsen.space/"
      WUD_TRIGGER_TELEGRAM_TELEGRAM_AUTO: "true"
      WUD_TRIGGER_TELEGRAM_TELEGRAM_BOTTOKEN: "${TELEGRAM_API_KEY}"
      WUD_TRIGGER_TELEGRAM_TELEGRAM_CHATID: "${TELEGRAM_TECH_ID}"
      WUD_TRIGGER_TELEGRAM_TELEGRAM_SIMPLEBODY: "A new version was found for $${container.name}. $${container.updateKind.kind=='tag' ? 'The current version ' + container.updateKind.localValue + ' can be updated to ' + container.updateKind.remoteValue : 'The digest for tag ' + container.result.tag + ' has changed.'}\\n\\n$${container.result && container.result.link ? 'Please review what has changed before updating: ' + container.result.link : ''}"
      WUD_TRIGGER_TELEGRAM_TELEGRAM_SIMPLETITLE: "An update is available for: $${container.name}!"
      WUD_TRIGGER_HTTP_SIGNAL_AUTO: "true"
      WUD_TRIGGER_HTTP_SIGNAL_METHOD: "GET"
      WUD_TRIGGER_HTTP_SIGNAL_URL: 'http://signal-rest-api:8080/v2/send?number=${SIGNAL_PHONE_NUMBER}&recipients=${SIGNAL_TECH_ID}&message=Update found for $${container.name}}'
      WUD_AUTH_BASIC_BASIC_USER: "dinth"
      WUD_AUTH_BASIC_BASIC_HASH: ${WUD_PASSWORD}
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      wud-socket-proxy:
        condition: service_healthy
    ports:
      - 3009:3000
    volumes:
      - /opt/docker/wud/wud_store:/store
      - /etc/localtime:/etc/localtime:ro
      - /etc/komodo/stacks:/docker
    networks:
      - wud
      - signal-rest-api
    logging: *default-logging
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Whats up Docker?"
      homepage.icon: "sh-whats-up-docker.png"
      homepage.href: "http://10.10.1.13:3009"
      homepage.description: "Docker updates manager"
      homepage.widget.type: "whatsupdocker"
      homepage.widget.url: "http://10.10.1.13:3009"
      homepage.widget.fields: "['monitoring', 'updates']"
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://getwud.github.io/wud/#/changelog/?id=_$${major}$${minor}$${patch}"
      wud.display.name: "Whats Up Docker?"
      wud.display.icon: "sh:wud"

networks:
  wud:
    name: wud
    driver: bridge
    external: false
  signal-rest-api:
    external: true
