x-versions:
  loki: &loki-version "grafana/loki:3.6.7"
  promtail-socket-proxy: &promtail-socket-proxy-version "wollomatic/socket-proxy:1.11.4"
  alloy: &alloy-version "grafana/alloy:v1.14.1"

services:
  promtail-socket-proxy:
    image: *promtail-socket-proxy-version
    container_name: promtail-socket-proxy
    ipc: private
    command:
      - '-loglevel=info'
      - '-allowfrom=promtail,alloy'
      - '-listenip=0.0.0.0'
      - '-allowGET=/v1\..{1,2}/(version|containers/.*|networks|events)'
      - '-allowHEAD=/_ping'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
      - '-allowhealthcheck'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - Promtail'
      wud.display.icon: 'mdi:connection'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring

  loki:
    container_name: loki
    image: *loki-version
    restart: unless-stopped
    user: ${DOCKER_PUID}:${DOCKER_PGID}
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1G
    command: ["-config.file=/etc/loki/local-config.yml"]
    environment:
      TZ: "${TZ}"
    hostname: loki
    ipc: private
    networks:
      - monitoring
    ports: 
      - 3100:3100
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-health"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /opt/docker/loki-promtail/loki-config.yml:/etc/loki/local-config.yml:ro
      - /opt/docker/loki-promtail/loki_storage:/loki
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.display.name: "Loki"
      wud.display.icon: "si:grafana"
      wud.link.template: 'https://github.com/grafana/loki/releases/tag/v$${major}.$${minor}.$${patch}'
      homepage.group: "Infrastructure"
      homepage.name: "Loki"
      homepage.icon: "grafana-loki.png"
      homepage.description: "Log Aggregation"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  alloy:
    image: *alloy-version
    container_name: alloy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    mem_limit: 512M
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - CHOWN
    security_opt:
      - no-new-privileges:true
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
      - "12345:12345/tcp"
    depends_on:
      loki:
        condition: service_healthy
      promtail-socket-proxy:
        condition: service_started
    command: [ "run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy", "--disable-reporting" ]
    environment:
      TZ: "${TZ}"
      HOSTNAME: "r720-omv" 
    healthcheck:
      test: ["CMD", "alloy validate /etc/alloy/config.alloy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - /opt/docker/loki-promtail/config.alloy:/etc/alloy/config.alloy:ro
      - /var/log:/var/log:ro
      - /var/log/journal:/var/log/journal:ro 
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /opt/docker/loki-promtail/alloy-storage:/var/lib/alloy
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.display.name: "Grafana Alloy"
      wud.display.icon: "si:grafana"
      wud.link.template: "https://github.com/grafana/alloy/releases/tag/$${tag}"
      homepage.group: "Infrastructure"
      homepage.name: "Alloy"
      homepage.icon: "grafana-alloy.png"
      homepage.description: "Log & Metric Collector"
      homepage.widget.type: "prometheus"
      homepage.widget.url: "http://alloy:12345"
    networks:
      - monitoring      
networks:
  monitoring:
    name: monitoring
    driver: bridge
    external: true