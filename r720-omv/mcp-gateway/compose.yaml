x-versions:
  mcp-gateway-socket-proxy-version: &mcp-gateway-socket-proxy-version wollomatic/socket-proxy:1.11.4
  mcp-gateway-version: &mcp-gateway-version docker/mcp-gateway:latest
  mqtt-mcp-version: &mqtt-mcp-version ghcr.io/ezhuk/mqtt-mcp:latest
  # mitmproxy-mcp: no published image, built from source

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mcp-gateway-socket-proxy:
    image: *mcp-gateway-socket-proxy-version
    container_name: mcp-gateway-socket-proxy
    ipc: private
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    command:
      - '-loglevel=info'
      - '-allowfrom=0.0.0.0/0'
      - '-listenip=0.0.0.0'
      - '-allowGET=/v1\..{1,2}/(containers/.*|images/.*|events|info|version)|/version'
      - '-allowHEAD=/_ping'
      - '-allowPOST=/v1\..{1,2}/(containers/.*|images/create)'
      - '-allowhealthcheck'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'     
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [mcp-gateway]
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    logging: *default-logging
    labels:
      wud.watch: "true"

  mcp-gateway:
    image: *mcp-gateway-version
    container_name: mcp-gateway
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    mem_limit: 512M
    ports: ["4888:8080"]
    command:
      - "--transport=sse"
      - "--port=8080"
      - "--catalog=/mcp/registry.yaml"
      - "--registry=/mcp/registry.yaml"
    environment:
      TZ: "${TZ}"
      DOCKER_HOST: "tcp://mcp-gateway-socket-proxy:2375"
    volumes:
      - /opt/docker/mcp-gateway/mcp-gateway_config:/mcp:ro
      - /opt/docker/mcp-gateway/mcp-gateway_certs:/certs:ro
      - /opt/docker:/opt/docker:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      mcp-gateway-socket-proxy: { condition: service_healthy }
    networks: [mcp-gateway]
    logging: *default-logging
    labels:
      wud.watch: "true"
  mqtt-mcp:
    image: *mqtt-mcp-version
    container_name: mqtt-mcp
    hostname: mqtt-mcp
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    mem_limit: 128M
    environment:
      TZ: "${TZ}"
      MQTT_MCP_MQTT__HOST: "10.10.1.11"
      MQTT_MCP_MQTT__PORT: "1883"
      MQTT_MCP_MQTT__USERNAME: "${MQTT_USERNAME}"
      MQTT_MCP_MQTT__PASSWORD: "${MQTT_PASSWORD}"
    healthcheck:
      test: ["CMD", "wget", "-q", "-T2", "-O-", "http://localhost:8000/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks: [mcp-gateway]
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.display.name: "MQTT MCP"

  # mitmproxy-mcp: MCP server for traffic inspection
  # Built from ghcr.io/astral-sh/uv:python3.12-bookworm-slim (runs as root)
  # MCP endpoint: http://<host>:8085/ (HTTP/SSE transport)
  mitmproxy-mcp:
    build:
      context: https://github.com/snapspecter/mitmproxy-mcp.git
    container_name: mitmproxy-mcp
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    mem_limit: 256M
    ports:
      - "8085:8080"  # MCP server port (HTTP/SSE)
    volumes:
      - /opt/docker/mcp-gateway/mitmproxy-mcp:/root/.mitmproxy
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: "${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [mcp-gateway]
    logging: *default-logging
    labels:
      wud.watch: "false"
      wud.display.name: "mitmproxy MCP"

networks:
  mcp-gateway:
    name: mcp-gateway
    driver: bridge