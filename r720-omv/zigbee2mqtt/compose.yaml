x-versions:
  zigbee2mqtt: &zigbee2mqtt-version "ghcr.io/koenkk/zigbee2mqtt:2.9.2"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  zigbee2mqtt:
    image: *zigbee2mqtt-version
    container_name: zigbee2mqtt
    hostname: zigbee2mqtt
    ipc: private
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - MKNOD
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256M
    environment:
      TZ: "${TZ}"
    healthcheck:
      test: 'wget -q -T2 -O- http://localhost:8080/ | grep Zigbee2MQTT || exit 1'
    ports:
      - 4080:8080
    volumes:
      - /opt/docker/zigbee2mqtt/zigbee2mqtt_data:/app/data
    networks:
      - zigbee2mqtt
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/Koenkk/zigbee2mqtt/releases/tag/$${major}.$${minor}.$${patch}'
      wud.display.name: 'Zigbee2MQTT'
      wud.display.icon: 'sh:zigbee2mqtt'
      repliqate.enabled: 'true'
      repliqate.engine: 'restic'
      repliqate.schedule: "@weekly 3am"
      repliqate.backup_id: zigbee2mqtt
      repliqate.retention: "90d"

networks:
  zigbee2mqtt:
    driver: bridge
    external: false
    name: zigbee2mqtt
