x-versions:
  # Python remaster (nodriver + stealth CDP) — replaces feldorn/free-games-claimer
  # (Playwright), which was getting captcha-walled at Epic checkout. Public ghcr
  # image, so this stays pull-based (WUD-watchable); `build:` fallback not needed.
  fgc: &fgc-version "ghcr.io/p-adamiec/free-games-claimer-remaster:v1.1"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  fgc:
    container_name: fgc
    image: *fgc-version
    ipc: private
    restart: unless-stopped
    tty: true
    stdin_open: true
    # Hardening deliberately relaxed to match upstream: the TurboVNC + Chrome
    # (nodriver) init runs as root and switches users, so no-new-privileges,
    # cap_drop: ALL, and a non-root `user:` break startup. Revisit once it boots.
#    security_opt:
#      - no-new-privileges:true
#    cap_drop:
#      - ALL
    mem_limit: 4G
    healthcheck:
      test: pgrep python3 && curl --fail http://localhost:7080 || exit 1
      interval: 30s
      timeout: 5s
      start_period: 60s
    ports:
      - "7080:7080" # noVNC web client (password-gated via VNC_PASSWORD)
      - "5900:5900" # raw TurboVNC — use a native VNC client (Remmina/TigerVNC) for
                    # reliable drag/slider captchas; browser noVNC drops drag moves
    volumes:
      # Fresh data dir — different app/DB/browser-profile schema than feldorn.
      # Old data kept at /opt/docker/fgc/fgc_data as a rollback point.
      - /opt/docker/fgc/remaster_data:/fgc/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: "${TZ}"
      # --- Display / VNC ---
      SHOW: "1" # keep browser visible so captchas can be hand-solved via noVNC
      NOVNC_PORT: "7080"
      VNC_PASSWORD: "${FGC_VNC_PASSWORD}"
      # --- Scheduler ---
      SCHEDULER_HOURS: "24"
      # --- Store selection ---
      # Microsoft Rewards is NOT supported by the remaster (dropped from feldorn).
      # Steam omitted: the remaster claims Steam via account login, and no Steam
      # credentials were configured before — add STEAM_USERNAME/PASSWORD + "steam"
      # here later if wanted.
      STORES: "epic,gog,prime"
      # --- Common credentials (fallback for per-store overrides) ---
      EMAIL: "${ADMIN_EMAIL}"
      PASSWORD: "${FGC_PASSWORD}"
      # --- Epic ---
      EG_EMAIL: "${ADMIN_EMAIL}"
      EG_PASSWORD: "${FGC_EG_PASS}"
#      EG_OTPKEY: "${FGC_EG_OTPKEY}" # uncomment if the Epic account uses TOTP 2FA
#      EG_PARENTALPIN: "${FGC_EG_PARENTALPIN}" # only if parental controls are on
      # --- GOG ---
      GOG_EMAIL: "${ADMIN_EMAIL}"
      GOG_PASSWORD: "${FGC_GOG_PASS}"
      # --- Prime Gaming (Amazon) ---
      PG_EMAIL: "${ADMIN_EMAIL}"
      PG_PASSWORD: "${FGC_PG_PASS}"
      PG_REDEEM: "1"
      PG_CLAIMDLC: "1"
      # --- Notifications (apprise) ---
      NOTIFY: "${FGC_NOTIFY}"
      NOTIFY_SUMMARY: "1"
      NOTIFY_ERRORS: "1"
      NOTIFY_CLAIM_FAILS: "1"
      NOTIFY_LOGIN_REQUEST: "1"
      # --- Behaviour ---
      DEBUG: "0" # no more Playwright-Inspector hang on failure
      DRYRUN: "0"
    labels:
      wud.watch: "true"
      # Upstream tags are 2-part (v1.1), so no $${patch} component here.
      wud.tag.include: '^v\d+\.\d+$$'
      wud.display.name: "Free Games Claimer (Remaster)"
      wud.link.template: 'https://github.com/P-Adamiec/Free-Games-Claimer-Remaster/releases/tag/v$${major}.$${minor}'
    networks:
      - fgc
    logging: *default-logging

networks:
  fgc:
    name: fgc
    driver: bridge
    external: false
