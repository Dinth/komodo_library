x-versions:
  spiderfoot-version: &spiderfoot-version saidsef/spiderfoot:v4.0
  misp-core-version: &misp-core-version ghcr.io/misp/misp-docker/misp-core:v2.5.44
  misp-modules-version: &misp-modules-version ghcr.io/misp/misp-docker/misp-modules:v3.0.9
  misp-mariadb-version: &misp-mariadb-version mariadb:11.4
  misp-valkey-version: &misp-valkey-version docker.io/valkey/valkey:9.1.0-alpine
  mitmproxy-version: &mitmproxy-version mitmproxy/mitmproxy:12.2.3

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  spiderfoot:
    image: *spiderfoot-version
    container_name: spiderfoot
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    mem_limit: 2G
    ports: ["5001:5001"]
    volumes:
      - /opt/docker/secops/spiderfoot:/var/lib/spiderfoot
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [secops]
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+$$'
      wud.display.name: "SpiderFoot"
      wud.display.icon: "sh:spiderfoot"
      wud.link.template: "https://github.com/smicallef/spiderfoot/releases/tag/v$${major}.$${minor}"
      homepage.group: "Security"
      homepage.name: "SpiderFoot"
      homepage.icon: "sh:spiderfoot"
      homepage.href: "http://10.10.1.13:5001"
      homepage.description: "OSINT reconnaissance"
      homepage.siteMonitor: "http://10.10.1.13:5001"

  misp-core:
    image: *misp-core-version
    container_name: misp
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE, FOWNER]
    mem_limit: 4G
    cpus: 2.0
    ports: ["8081:80"]
    # Env var names below are the ones ghcr.io/misp/misp-docker/misp-core
    # actually reads in /entrypoint.sh - anything else is silently ignored.
    environment:
      - ADMIN_PASSWORD=${SECOPS_MISP_ADMIN_PASSWORD}
      - BASE_URL=http://10.10.1.13:8081
      # Served over plain HTTP on :8081; without this nginx 301s to
      # https://10.10.1.13/ (port stripped) and the UI is unreachable.
      - DISABLE_SSL_REDIRECT=true
      - MYSQL_HOST=misp-mariadb
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD}
      - MYSQL_DATABASE=misp
      # Redis is mandatory: workers and PHP sessions both live in it.
      - REDIS_HOST=misp-valkey
      - REDIS_PORT=6379
      - ENABLE_REDIS_EMPTY_PASSWORD=true
      - MISP_MODULES_FQDN=http://misp-modules
      # Reduce worker counts to minimize idle CPU (default is 5 each)
      - NUM_WORKERS_DEFAULT=1
      - NUM_WORKERS_EMAIL=1
      - NUM_WORKERS_CACHE=1
      - NUM_WORKERS_PRIO=1
      - NUM_WORKERS_UPDATE=1
    volumes:
      - /opt/docker/secops/misp_config:/var/www/MISP/app/Config
      - /opt/docker/secops/misp_files:/var/www/MISP/app/files
      - /opt/docker/secops/misp_gnuPG:/var/www/MISP/.gnupg
      - /opt/docker/secops/misp_customimages:/var/www/MISP/app/webroot/img/custom
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      misp-mariadb: { condition: service_healthy }
      misp-valkey: { condition: service_healthy }
      misp-modules: { condition: service_started }
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost/users/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks: [secops]
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/MISP/MISP/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: "MISP Core"
      wud.display.icon: "sh:misp"
      homepage.group: "Security"
      homepage.name: "MISP"
      homepage.icon: "sh:misp"
      homepage.href: "http://10.10.1.13:8081"
      homepage.description: "Threat intelligence platform"
      homepage.siteMonitor: "http://10.10.1.13:8081"
  misp-modules:
    image: *misp-modules-version
    container_name: misp-modules
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    mem_limit: 1G
    networks: [secops]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6666/modules').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/MISP/misp-modules/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: "MISP Modules"
  misp-valkey:
    image: *misp-valkey-version
    container_name: misp-valkey
    hostname: misp-valkey
    ipc: private
    restart: unless-stopped
    command: ['valkey-server', '--save', '30', '1', '--loglevel', 'warning']
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID]
    mem_limit: 512M
    volumes:
      - /opt/docker/secops/misp-valkey:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: '[ $$(valkey-cli ping) = ''PONG'' ]'
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [secops]
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+-alpine$$'
      wud.display.name: "MISP Valkey"
      wud.link.template: "https://github.com/valkey-io/valkey/releases/tag/$${major}.$${minor}.$${patch}"

  misp-mariadb:
    image: *misp-mariadb-version
    container_name: misp-mariadb
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    mem_limit: 1G
    environment:
      - MYSQL_ROOT_PASSWORD=${MISP_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD}
    volumes:
      - /opt/docker/secops/misp-mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [secops]
    logging: *default-logging

  mitmproxy:
    image: *mitmproxy-version
    container_name: mitmproxy
    entrypoint: [""]
    # confdir is pinned to a bind-mounted path: the image's own /home/mitmproxy
    # is mode 0700 owned by uid 1000, so DOCKER_PUID cannot traverse into it.
    command: ["mitmweb", "--web-host", "0.0.0.0", "--web-port", "8081", "--listen-port", "8080", "--set", "block_global=false", "--set", "confdir=/mitmproxy"]
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    environment:
      - HOME=/mitmproxy
    ipc: private
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    mem_limit: 512M
    ports:
      - "8084:8080"  # Proxy port - point devices here
      - "8184:8081"  # Web UI for visual inspection
    volumes:
      - /opt/docker/secops/mitmproxy:/mitmproxy
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket,sys; s=socket.socket(); s.settimeout(5); s.connect(('localhost',8081)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks: [secops]
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.display.name: "mitmproxy"
      wud.display.icon: "sh:mitmproxy"
      wud.link.template: "https://github.com/mitmproxy/mitmproxy/releases/tag/v$${major}.$${minor}.$${patch}"
      homepage.group: "Security"
      homepage.name: "mitmproxy"
      homepage.icon: "sh:mitmproxy"
      homepage.href: "http://10.10.1.13:8184"
      homepage.description: "HTTP/S traffic inspection"
      homepage.siteMonitor: "http://10.10.1.13:8184"

networks:
  secops:
    name: secops
    driver: bridge
