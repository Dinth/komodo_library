x-versions:
  ollama: &ollama-version "ollama/ollama:0.24.0"
  openwebui: &openwebui-version "ghcr.io/open-webui/open-webui:v0.9.5"
  hass-mcp: &hass-mcp-version "voska/hass-mcp:0.1.1"
  ollama-metrics: &ollama-metrics-version "ghcr.io/norskhelsenett/ollama-metrics:latest"
  comfyui: &comfyui-version "ghcr.io/ai-dock/comfyui:latest-cuda"
  comfyui-idle: &comfyui-idle-version "curlimages/curl:8.11.1"
  crawl4ai: &crawl4ai-version "unclecode/crawl4ai:latest"

services:
  ollama:
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ['serve']
    container_name: ollama
    entrypoint: ['/bin/ollama']
    environment:
      OLLAMA_HOST: "0.0.0.0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      NVIDIA_VISIBLE_DEVICES: "all"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_DEBUG: "1"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
      OLLAMA_LOAD_TIMEOUT: "10m"
      OLLAMA_MAX_QUEUE: "64"
      GIN_MODE: "release"
      TZ: "${TZ}"
    hostname: ollama
    image: *ollama-version
    ipc: private
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: '64G'
        reservations:
          memory: '8G'
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute,utility]
    # Pin to NUMA node 0 (even threads only). 8 threads = matches cpus limit.
    cpuset: "0,2,4,6,8,10,12,14"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.display.name: "Ollama"
      wud.display.icon: "sh:ollama"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/ollama/ollama/releases/tag/v$${major}.$${minor}.$${patch}"
    healthcheck:
      test: "ollama --version && ollama ps && bash -c 'cat < /dev/null > /dev/tcp/localhost/11434'|| exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openwebui
    ports:
      - 11435:11434/tcp
    restart: unless-stopped
    volumes:
      - /opt/docker/openwebui/ollama_data:/root/.ollama
  ollama-metrics:
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    container_name: ollama-metrics
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      TZ: "${TZ}"
    hostname: ollama-metrics
    image: *ollama-metrics-version
    ipc: private
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openwebui
    ports:
      - 11434:8080/tcp
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.display.name: "Ollama Metrics Proxy"
      wud.display.icon: "sh:chart"
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
  comfyui:
    image: *comfyui-version
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    # Note: ai-dock images must run as root for init (user creation, supervisord)
    container_name: comfyui
    shm_size: '4gb'
    environment:
      # ComfyUI ships with no models. On first boot this provisioning script
      # pulls the DreamShaper XL Turbo checkpoint into persistent /workspace
      # storage; ai-dock symlinks it into ComfyUI's models/checkpoints dir.
      # Idempotent (wget -nc).
      PROVISIONING_SCRIPT: "https://raw.githubusercontent.com/Dinth/komodo_library/main/r720-omv/openwebui/comfyui-provisioning.sh"
      # --listen binds all interfaces so OpenWebUI (and the host port) can reach
      # the API. Default "smart" VRAM management lets ComfyUI release memory back
      # to Ollama on the shared RTX 5000; the comfyui-idle sidecar forces /free.
      COMFYUI_ARGS: "--listen"
      DIRECT_ADDRESS: "0.0.0.0"
      WEB_ENABLE_AUTH: "false"
      CF_QUICK_TUNNELS: "false"
      SKIP_ACL: "true"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      NVIDIA_VISIBLE_DEVICES: "all"
      PYTORCH_CUDA_ALLOC_CONF: "garbage_collection_threshold:0.9,max_split_size_mb:512"
      TZ: "${TZ}"
    hostname: comfyui
    ipc: private
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: '32G'
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute,utility]
    # Pin to NUMA node 1 (odd threads) to avoid CPU-cache contention with ollama on NUMA 0
    cpuset: "1,3,5,7"
    healthcheck:
      # Generous start_period: first boot downloads the ~6.9 GB DreamShaper XL
      # Turbo checkpoint before ComfyUI answers on 8188.
      test: ["CMD-SHELL", "curl --fail http://localhost:8188/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.display.name: "ComfyUI"
      wud.display.icon: "sh:comfyui"
      wud.link.template: "https://github.com/ai-dock/comfyui/releases"
    networks:
      - openwebui
    ports:
      - 8188:8188/tcp
    volumes:
      - /opt/docker/openwebui/comfyui_workspace:/workspace
    restart: unless-stopped
  comfyui-idle:
    image: *comfyui-idle-version
    container_name: comfyui-idle
    depends_on:
      comfyui:
        condition: service_healthy
    environment:
      TZ: "${TZ}"
    entrypoint: ["/bin/sh", "-c"]
    # Frees VRAM by calling ComfyUI's /free after IDLE seconds with an empty
    # queue; the next generation reloads the checkpoint. Never fires mid-render
    # because a non-empty queue_running/queue_pending resets the timer.
    command:
      - |
        A=http://comfyui:8188; IDLE=600; STEP=60; idle=0; loaded=1
        while :; do
          sleep $$STEP
          q=$$(curl -sf "$$A/queue" | tr -d ' \n')
          case "$$q" in
            *'"queue_running":[]'*'"queue_pending":[]'*) running=0 ;;
            *) running=1 ;;
          esac
          if [ "$$running" = 1 ]; then
            idle=0; loaded=1
          elif [ "$$loaded" = 1 ]; then
            idle=$$((idle+STEP))
            if [ "$$idle" -ge "$$IDLE" ]; then
              curl -sf -X POST "$$A/free" -H 'Content-Type: application/json' \
                -d '{"unload_models":true,"free_memory":true}' >/dev/null 2>&1 \
                && { loaded=0; echo "[idle-unload] freed ComfyUI VRAM after $${idle}s idle"; }
            fi
          fi
        done
    ipc: private
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    restart: unless-stopped
    networks:
      - openwebui
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '32M'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      wud.watch: "true"
      wud.display.name: "ComfyUI Idle Unloader"
      wud.display.icon: "sh:curl"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
  openwebui-pipelines:
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    container_name: openwebui-pipelines
    environment:
      PIPELINES_PORT: "9099"
      OLLAMA_BASE_URL: "http://ollama:11434"
      DATABASE_URL: "sqlite:///app/pipelines/pipelines.db"
      PIPELINES_API_KEY: "${OPENWEBUI_PIPELINES_PASS}"
      PIPELINES_URLS: "https://raw.githubusercontent.com/open-webui/pipelines/main/examples/pipelines/providers/google_manifold_pipeline.py"
      TZ: "${TZ}"
    hostname: openwebui-pipelines
    image: ghcr.io/open-webui/pipelines:main
    ipc: private
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9099/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openwebui
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.display.name: "OpenWebUI Pipelines"
      wud.display.icon: "sh:open-webui"
      wud.tag.include: '^v\d+\.\d+\.\d+$'
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    volumes:
      - /opt/docker/openwebui/openwebui-pipelines_data:/app/pipelines
  openwebui:
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    container_name: openwebui
    environment:
      USE_OLLAMA_DOCKER: "true"
      PORT: "8080"
      OLLAMA_BASE_URL: "http://ollama:11434"
      PIPELINES_URL: "http://openwebui-pipelines:9099"
      ENABLE_SIGNUP: "false"
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: "${OPENWEBUI_SECRET_KEY}"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
      AIOHTTP_CLIENT_TIMEOUT: "600"
      ENABLE_RAG_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: "searxng"
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: "https://search.${DOMAIN_NAME}/search?q=<query>"
      ENABLE_IMAGE_GENERATION: "true"
      IMAGE_GENERATION_ENGINE: "comfyui"
      COMFYUI_BASE_URL: "http://comfyui:8188"
      MCP_SERVERS: "Grafana@http://mcp-grafana:5133"
      OPENWEBUI_MCP_SYNC_MODE: "true"
      TZ: "${TZ}"
    hostname: openwebui
    image: *openwebui-version
    ipc: private
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '8G'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      ollama:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    tmpfs:
      - /tmp
    networks:
      - openwebui
      - traefik
    ports:
      - 3311:8080/tcp
    labels:
      traefik.enable: "true"
      traefik.http.routers.openwebai.rule: "Host(`ai.${DOMAIN_NAME}`)"
      traefik.http.routers.openwebai.entrypoints: "websecure"
      traefik.http.routers.openwebai.tls: "true"
      traefik.http.routers.openwebai.tls.certresolver: "letsencrypt"
      traefik.http.routers.openwebai.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.openwebai.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.openwebai.middlewares: "secHeaders@file"
      traefik.http.services.openwebai.loadbalancer.server.port: "8080"
      homepage.group: "Home"
      homepage.name: "OpenWebUI"
      homepage.icon: "sh-open-webui.png"
      homepage.href: "https://ai.${DOMAIN_NAME}"
      homepage.description: "AI chat interface"
      homepage.siteMonitor: "https://ai.${DOMAIN_NAME}"
      wud.watch: "true"
      wud.display.name: "OpenWebUI Server - AI agent manager"
      wud.display.icon: "sh:open-webui"
      wud.tag.include: '^v\d+\.\d+\.\d+$'
      wud.link.template: "https://github.com/open-webui/open-webui/releases/tag/v$${major}.$${minor}.$${patch}"
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    volumes:
      - /opt/docker/openwebui/openwebui_data:/app/backend/data
  mcp-hass:
    cap_drop:
      - ALL
    container_name: mcp-hass
    environment:
      HA_URL: "http://10.10.1.11:8123"
      HA_TOKEN: "${HASS_TOKEN}"
      TZ: "${TZ}"
    hostname: mcp-hass
    image: *hass-mcp-version
    ipc: private
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stdin_open: true
    tty: false
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openwebui
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.display.name: "Home Assistant MCP"
      wud.display.icon: "sh:home-assistant"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/voska/hass-mcp/releases/tag/v$${major}.$${minor}.$${patch}"
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    volumes:
      - /opt/docker/openwebui/mcp-hass_data:/app/data
  crawl4ai:
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Note: upstream image runs as root and uses a pre-baked Playwright/Chromium
    # cache under /root and /ms-playwright. Forcing user: ${DOCKER_PUID}:${DOCKER_PGID}
    # breaks browser launch. Same exception as ollama / comfyui in this file.
    # Chromium is started with --no-sandbox by the entrypoint, so SYS_ADMIN is not needed.
    container_name: crawl4ai
    environment:
      # The upstream server reads its token from config.yml, not directly from an
      # env var. The value is plumbed in so a future config.yml bind mount can pick
      # it up via ${CRAWL4AI_API_TOKEN}. Until then the API accepts unauthenticated
      # requests — acceptable because the service is internal-only on the openwebui
      # network with no Traefik route and no published host port.
      OPENWEBCRAWL4AI_API_TOKEN: "${OPENWEBUI_CRAWL4AI_API_TOKEN}"
      SECRET_KEY: "${OPENWEBUI_CRAWL4AI_API_TOKEN}"
      CRAWL4AI_HOOKS_ENABLED: "false"
      TZ: "${TZ}"
    hostname: crawl4ai
    image: *crawl4ai-version
    ipc: private
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '4G'
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:11235/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openwebui
    labels:
      wud.watch: "true"
      wud.watch.digest: "true"
      wud.display.name: "Crawl4AI"
      wud.display.icon: "sh:spider"
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/docker/openwebui/crawl4ai_data:/data
networks:
  openwebui:
    name: openwebui
    driver: bridge
    external: false
  traefik:
    external: true
