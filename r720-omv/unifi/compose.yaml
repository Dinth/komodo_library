x-versions:
  mongo: &mongo-version "docker.io/mongo:8.2.5"
  unifi: &unifi-version "lscr.io/linuxserver/unifi-network-application:10.1.89"
  unifi-mcp: &unifi-mcp-version "ghcr.io/sirkirby/unifi-network-mcp:latest"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  unifi-db:
    image: *mongo-version
    container_name: unifi-db
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    ipc: private
    restart: unless-stopped
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1G
    healthcheck:
      test: ["CMD","mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - /opt/docker/unifi/unifi_db:/data/db
      - /opt/docker/unifi/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/mongodb/mongo/releases/tag/r$${major}.$${minor}.$${patch}'
      wud.display.name: 'Unifi Network Application - Mongo DB'
      wud.display.icon: 'sh:ubiquiti-unifi-dark'

  unifi-network-application:
    image: *unifi-version
    container_name: unifi-network-application
    ipc: private
    restart: unless-stopped
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2G
    environment:
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
      TZ: "${TZ}"
      MONGO_USER: "unifi"
      MONGO_PASS: "${MONGO_PASS}"
      MONGO_HOST: "unifi-db"
      MONGO_PORT: "27017"
      MONGO_DBNAME: "unifi"
      MEM_LIMIT: "1024"
      MEM_STARTUP: "1024"
    volumes:
      - ./config:/config
    ports:
      - 8443:8443
      - 3478:3478/udp
      - 10001:10001/udp
      - 9080:8080
      - 8843:8843
      - 8880:8880
      - 6789:6789
      - 5514:5514/udp
    logging: *default-logging
    labels:
      homepage.description: "WiFi management"
      homepage.group: "Infrastructure"
      homepage.href: "https://10.10.1.13:8443"
      homepage.icon: "sh-ubiquiti-unifi-dark.png"
      homepage.name: "Unifi Network Application"
      homepage.widget.type: "unifi"
      homepage.widget.url: "https://10.10.1.13:8443"
      homepage.widget.username: "${HOMEPAGE_UNIFI_USER}"
      homepage.widget.password: "${HOMEPAGE_UNIFI_PASS}"
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/linuxserver/docker-unifi-network-application/releases/tag/$${major}.$${minor}.$${patch}'
      wud.display.name: 'Unifi Network Application'
      wud.display.icon: 'sh:ubiquiti-unifi-dark'
      repliqate.enabled: 'true'
      repliqate.engine: "restic"
      repliqate.schedule: "@weekly 3am"
      repliqate.backup_id: unifi
      repliqate.retention: "90d"

  unifi-network-mcp:
    image: *unifi-mcp-version
    container_name: unifi-network-mcp
    ipc: private
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256M
    environment:
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
      TZ: "${TZ}"
      UNIFI_HOST: "10.10.1.13"
      UNIFI_USERNAME: "mcp"
      UNIFI_PASSWORD: "${UNIFI_MCP_PASS}"
      UNIFI_PORT: "8443"
      UNIFI_SITE: "default"
      UNIFI_VERIFY_SSL: "false"
      UNIFI_MCP_HTTP_ENABLED: "true"
      UNIFI_MCP_ALLOWED_HOSTS: "10.10.1.13,10.10.10.10,localhost,127.0.0.1"
    ports:
      - "5134:3000"
    depends_on:
      - unifi-network-application
    logging: *default-logging
    labels:
      homepage.description: "UniFi Network MCP (HTTP/SSE)"
      homepage.group: "Infrastructure"
      homepage.icon: "sh-ubiquiti-unifi-dark.png"
      homepage.name: "UniFi Network MCP"
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/sirkirby/unifi-network-mcp/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'UniFi Network MCP'
      wud.display.icon: 'sh:ubiquiti-unifi-dark'
