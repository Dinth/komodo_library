x-versions:
  socket-proxy: &socket-proxy-version "wollomatic/socket-proxy:1.12.2"
  traefik: &traefik-version "traefik:v3.7.5"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik-socket-proxy:
    image: *socket-proxy-version
    ipc: private
    command:
      - '-loglevel=info'
      - '-allowfrom=traefik'
      - '-listenip=0.0.0.0'
      - '-allowGET=/v1\..{1,2}/(version|containers/.*|events.*)'
      - '-allowHEAD=/_ping'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
      - '-allowhealthcheck'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "65534:${DOCKER_SOCKET_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - Traefik'
      wud.display.icon: 'mdi:connection'

  traefik:
    image: *traefik-version
    container_name: traefik
    ipc: private
    restart: unless-stopped
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      # --- API, Dashboard & Logging ---
      TRAEFIK_API_DASHBOARD: "true"
      # Insecure API is ENABLED so the Homepage widget can read it, but the :8080
      # entrypoint port is NOT published to the host (see `ports:`), so it is only
      # reachable over the internal `traefik` docker network — not from the LAN.
      # Human dashboard access is via the websecure `traefik-dashboard` router
      # (api@internal) behind Authelia forward-auth + lan-only (see labels below).
      TRAEFIK_API_INSECURE: "true"
      TRAEFIK_API_DEBUG: "false"
      TRAEFIK_LOG_LEVEL: "INFO"
      TRAEFIK_ACCESSLOG: "true"
      TRAEFIK_ACCESSLOG_FILEPATH: "/tmp/access.log"
      TRAEFIK_ACCESSLOG_FORMAT: "json"
      TZ: "${TZ}"
      # --- EntryPoints Configuration ---
      # Web (HTTP) EntryPoint on port 80 with a global redirect to websecure
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ":80"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO: "websecure"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME: "https"
      # Demote the global redirect's priority (default ~maxint) below the
      # mojecert-verification router (priority 2000) so that one .well-known
      # path is served over plain HTTP; every other web request still redirects.
      # Kept at 1000 (well above any rule-length-derived default priority) so a
      # future web router with a long rule can't accidentally serve plaintext.
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_PRIORITY: "1000"
      # Wazuh agent edge ports. 1514/1515 on this host are owned by Alloy syslog,
      # so we expose custom ports 9514 (agent comms) / 9515 (authd enrollment) and
      # map them to the Wazuh manager's default 1514/1515 on 10.10.1.18 via the
      # HostSNI(`*`) TCP routers in traefik_dynamic.yml. Manager is left unchanged.
      TRAEFIK_ENTRYPOINTS_WAZUHAGENT_ADDRESS: ":9514"
      TRAEFIK_ENTRYPOINTS_WAZUHENROLL_ADDRESS: ":9515"
      # Websecure (HTTPS) EntryPoint on port 443
      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: ":443"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_CERTRESOLVER: "letsencrypt"
      # Trust Cloudflare IPs for X-Forwarded-* headers (real client IP extraction)
      # IPs from https://www.cloudflare.com/ips-v4/ plus 104.28.0.0/14
      TRAEFIK_ENTRYPOINTS_WEBSECURE_FORWARDEDHEADERS_TRUSTEDIPS: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,104.28.0.0/14,172.64.0.0/13,131.0.72.0/22"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_TRANSPORT_RESPONDINGTIMEOUTS_READTIMEOUT: "1200s"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_TRANSPORT_RESPONDINGTIMEOUTS_IDLETIMEOUT: "1200s"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_TRANSPORT_RESPONDINGTIMEOUTS_WRITETIMEOUT: "1200s"
      TRAEFIK_SERVERSTRANSPORT_INSECURESKIPVERIFY: "true"
      # --- Providers Configuration ---
      # Docker Provider
      TRAEFIK_PROVIDERS_DOCKER: "true"
      TRAEFIK_PROVIDERS_DOCKER_ENDPOINT: "tcp://traefik-socket-proxy:2375"
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: "false"
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: "traefik"
      # File Provider
      TRAEFIK_PROVIDERS_FILE_FILENAME: "/traefik_dynamic.yml"
      TRAEFIK_PROVIDERS_FILE_WATCH: "true"
      # --- Experimental Plugins ---
      # staticresponse: lets a router return an inline body (used to serve the
      # mojeCERT domain-verification token over plain HTTP). Cached under
      # /plugins-storage so a restart never depends on GitHub reachability.
      TRAEFIK_EXPERIMENTAL_PLUGINS_STATICRESPONSE_MODULENAME: "github.com/jdel/staticresponse"
      TRAEFIK_EXPERIMENTAL_PLUGINS_STATICRESPONSE_VERSION: "v0.0.1"
      # --- Certificate Resolver (Let's Encrypt with Cloudflare DNS Challenge) ---
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL: "${ADMIN_EMAIL}"
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_STORAGE: "/certs/acme.json"
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_CASERVER: "https://acme-v02.api.letsencrypt.org/directory"
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_DNSCHALLENGE_PROVIDER: "cloudflare"
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_DNSCHALLENGE_PROPAGATION_DELAYBEFORECHECKS: "30"
      TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_DNSCHALLENGE_PROPAGATION_DISABLECHECKS: "true"
      CF_API_EMAIL: "${ADMIN_EMAIL}"
      CF_DNS_API_TOKEN: "${TRAEFIK_CF_DNS_API_TOKEN}"
      LOCAL_IPS: "127.0.0.1/32,10.0.0.0/8,192.168.0.0/16,172.16.0.0/12"
      # Cloudflare IPs from https://www.cloudflare.com/ips-v4/ plus 104.28.0.0/14 for additional CF ranges
      CLOUDFLARE_IPS: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,104.28.0.0/14,172.64.0.0/13,131.0.72.0/22"
    depends_on:
      traefik-socket-proxy:
        condition: service_healthy
    networks:
      traefik-internal:
      traefik:
        # Resolve the public auth hostname to this container *inside* the docker
        # network, so server-to-server OIDC calls (e.g. WUD discovering
        # id.${DOMAIN_NAME}) hit Traefik:443 directly instead of hairpinning to
        # the host IP 10.10.1.13:443 (which is refused from the docker bridge).
        # The wildcard *.${DOMAIN_NAME} cert + the id.${DOMAIN_NAME} router on
        # websecure handle TLS and routing to Authelia.
        aliases:
          - "id.${DOMAIN_NAME}"
    ports:
      - 80:80
      - 443:443
      - 9514:9514
      - 9515:9515
    volumes:
      - /opt/docker/traefik/traefik_certs:/certs
      - /opt/docker/traefik/traefik_dynamic.yml:/traefik_dynamic.yml:ro
      - /opt/docker/traefik/traefik_plugins:/plugins-storage
    tmpfs:
      - /tmp
    logging: *default-logging
    labels:
      # --- Dashboard exposed via Traefik (api@internal) behind Authelia ---
      # exposedbydefault=false, so the container must opt in.
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik.${DOMAIN_NAME}`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls: "true"
      traefik.http.routers.traefik-dashboard.tls.certresolver: "letsencrypt"
      traefik.http.routers.traefik-dashboard.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.traefik-dashboard.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
      traefik.http.routers.traefik-dashboard.middlewares: "secHeaders@file,authelia-auth@docker,lan-only@file"
      homepage.group: "Infrastructure"
      homepage.name: "Traefik"
      homepage.icon: "traefik.png"
      homepage.href: "https://traefik.${DOMAIN_NAME}"
      homepage.description: "HTTP reverse proxy"
      homepage.siteMonitor: "https://traefik.${DOMAIN_NAME}"
      # Widget reaches the API over the internal traefik docker network (the :8080
      # insecure entrypoint), since the public router is gated by Authelia.
      homepage.widget.type: "traefik"
      homepage.widget.url: "http://traefik:8080"
      homepage.widget.fields: "['routers', 'services', 'middleware']"
      wud.watch: "true"
      wud.display.name: "Traefik"
      wud.display.icon: "sh:traefik"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/traefik/traefik/releases/tag/v$${major}\.$${minor}\.$${patch}'

networks:
  traefik:
    name: traefik
    driver: bridge
    external: false
    ipam:
      config:
        - subnet: 10.55.0.0/16
          ip_range: 10.55.0.0/24
  traefik-internal:
    name: traefik-internal
    driver: bridge
    internal: true
