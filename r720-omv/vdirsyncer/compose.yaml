x-versions:
  # Base image the local patched image is built FROM (see Dockerfile).
  # Releases: https://github.com/Bleala/Vdirsyncer-DOCKERIZED/releases
  # Bump this + redeploy (rebuild) to update; the Location-header patch re-applies.
  vdirsyncer-base: &vdirsyncer-base "bleala/vdirsyncer:2.6.1"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-vdirsyncer-env: &vdirsyncer-env
  TZ: ${TZ:-UTC}

services:
  vdirsyncer:
    build:
      context: .
      args:
        BASE_IMAGE: *vdirsyncer-base
    image: vdirsyncer-patched:2.6.1
    pull_policy: never
    container_name: vdirsyncer
    ipc: private
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    mem_limit: 256M
    environment:
      <<: *vdirsyncer-env
      AUTODISCOVER: "false"
      AUTOSYNC: "true"
      CRON_TIME: "${VDIRSYNCER_CRON_TIME:-*/15 * * * *}"
    volumes:
      - /opt/docker/vdirsyncer/vdirsyncer_config/config:/vdirsyncer/config:ro
      - /opt/docker/vdirsyncer/vdirsyncer_status:/status
      - /opt/docker/vdirsyncer/vdirsyncer_tokens:/vdirsyncer/tokens
      - /etc/localtime:/etc/localtime:ro
    networks: [vdirsyncer]
    logging: *default-logging
    # WUD disabled: the running image is a locally-built patched tag, not a
    # registry tag, so WUD can't watch it. Restore these (and revert the
    # build:/image: block to a plain `image: *vdirsyncer-base`) once the
    # upstream Location-header fix ships and the patch is no longer needed.
    # labels:
    #   wud.watch: "true"
    #   wud.tag.include: '^\d+\.\d+\.\d+$$'
    #   wud.display.name: "vdirsyncer"
    #   wud.link.template: 'https://github.com/Bleala/Vdirsyncer-DOCKERIZED/releases/tag/$${major}.$${minor}.$${patch}'

networks:
  vdirsyncer:
    name: vdirsyncer
    driver: bridge
