x-versions:
  vouchervault: &vouchervault-version "l4rm4nd/vouchervault:1.25.8"
  valkey: &valkey-version "docker.io/valkey/valkey:9.0.3-alpine"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  vouchervault:
    image: *vouchervault-version
    container_name: vouchervault
    hostname: vouchervault
    ipc: private
    restart: unless-stopped
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      DOMAIN: "cards.${DOMAIN_NAME}"
      SECURE_COOKIES: "True"
      EXPIRY_THRESHOLD_DAYS: "90"
      TZ: "${TZ}"
    depends_on:
      vouchervault-valkey:
        condition: service_healthy
    ports:
      - 8077:8000
    volumes:
      - /opt/docker/vouchervault/vouchervault_db:/opt/app/database
    networks:
      - vouchervault
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      traefik.http.routers.vouchervault.rule: "Host(`cards.${DOMAIN_NAME}`)"
      traefik.http.routers.vouchervault.entrypoints: "websecure"
      traefik.http.routers.vouchervault.tls: "true"
      traefik.http.routers.vouchervault.tls.certresolver: "letsencrypt"
      traefik.http.routers.vouchervault.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.vouchervault.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.vouchervault.middlewares: "secHeaders@file"
      traefik.http.services.vouchervault.loadbalancer.server.port: "8000"
      homepage.group: "Home"
      homepage.name: "Vouchervault"
      homepage.icon: "sh-vouchervault.png"
      homepage.href: "https://cards.${DOMAIN_NAME}"
      homepage.description: "Loyalty cards manager"
      homepage.siteMonitor: "https://cards.${DOMAIN_NAME}"
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/l4rm4nd/VoucherVault/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: "VoucherVault"
      wud.display.icon: "sh-vouchervault"

  vouchervault-valkey:
    image: *valkey-version
    container_name: vouchervault-valkey
    hostname: vouchervault-valkey
    ipc: private
    restart: unless-stopped
    command: ['valkey-server','--save','30','1','--loglevel','warning']
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - CHOWN
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128M
    healthcheck:
      test: '[ $$(valkey-cli ping) = ''PONG'' ]'
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    volumes:
      - /opt/docker/vouchervault/valkey-data:/data
    networks:
      - vouchervault
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    labels:
      wud.display.name: "Vouchervault - Valkey"
      wud.display.icon: "sh-vouchervault"
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+\-alpine$$'
      wud.link.template: 'https://github.com/valkey-io/valkey/releases/tag/$${major}.$${minor}.$${patch}'

networks:
  vouchervault:
    name: vouchervault
    driver: bridge
    external: false
  traefik:
    external: true
