x-versions:
  babybuddy: &babybuddy-version "linuxserver/babybuddy:2.8.0"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  babybuddy:
    image: *babybuddy-version
    container_name: babybuddy
    hostname: babybuddy
    ipc: private
    restart: unless-stopped
    entrypoint: ["/init"]
    working_dir: /
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      TZ: "${TZ}"
      CSRF_TRUSTED_ORIGINS: "https://baby.${DOMAIN_NAME},http://10.10.1.13:3938"
      DEBUG: "true"
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      start_period: 60s
      interval: 20s
      timeout: 5s
      retries: 3
    ports:
      - 3938:8000/tcp
    volumes:
      - /opt/docker/babybuddy/babybuddy_data:/config
    networks:
      - babybuddy
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      traefik.http.routers.babybuddy.rule: "Host(`baby.${DOMAIN_NAME}`)"
      traefik.http.routers.babybuddy.entrypoints: "websecure"
      traefik.http.routers.babybuddy.tls: "true"
      traefik.http.routers.babybuddy.tls.certresolver: "letsencrypt"
      traefik.http.routers.babybuddy.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.babybuddy.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.babybuddy.middlewares: "secHeaders@file"
      traefik.http.services.babybuddy.loadbalancer.server.port: "8000"
      homepage.group: Home
      homepage.name: Babybuddy
      homepage.description: Baby journal
      homepage.href: https://baby.${DOMAIN_NAME}
      homepage.icon: sh-baby-buddy.png
      homepage.siteMonitor: "https://baby.${DOMAIN_NAME}"
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/babybuddy/babybuddy/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: "Babybuddy"
      wud.display.icon: "sh-baby-buddy"
      repliqate.enabled: 'true'
      repliqate.engine: "restic"
      repliqate.schedule: "@weekly 3am"
      repliqate.backup_id: babybuddy
      repliqate.retention: "30d"

networks:
  babybuddy:
    name: babybuddy
    driver: bridge
    external: false
  traefik:
    external: true
