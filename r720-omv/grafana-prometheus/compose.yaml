x-versions:
  grafana: &grafana-version "grafana/grafana:13.1.0"
  prometheus: &prometheus-version "prom/prometheus:v3.12.0"
  node-exporter: &node-exporter-version "prom/node-exporter:v1.11.1"
  cadvisor: &cadvisor-version "gcr.io/cadvisor/cadvisor:v0.55.1"
  dcgm-exporter: &dcgm-exporter-version "nvidia/dcgm-exporter:4.5.2-4.8.1-distroless"
  blackbox-exporter: &blackbox-exporter-version "prom/blackbox-exporter:v0.28.0"
  snmp-exporter: &snmp-exporter-version "prom/snmp-exporter:v0.30.1"
  mcp-grafana: &mcp-grafana-version "grafana/mcp-grafana:latest"

services:
  grafana:
    container_name: grafana
    image: *grafana-version
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_PASSWORD_RESET_LINK_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_DEFAULT_THEME: "dark"
      TZ: "${TZ}"
      # --- Public URL (behind Traefik) — required so OAuth redirect_uri is correct ---
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN_NAME}"
      # --- Authelia OIDC (generic OAuth) ---
      # Local admin login form is intentionally left enabled as a break-glass
      # fallback (and the Homepage widget authenticates via the admin account).
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authelia"
      GF_AUTH_GENERIC_OAUTH_ICON: "signin"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${GRAFANA_OIDC_CLIENT_SECRET}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups offline_access"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://id.${DOMAIN_NAME}/api/oidc/authorization"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://id.${DOMAIN_NAME}/api/oidc/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://id.${DOMAIN_NAME}/api/oidc/userinfo"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: "true"
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
      GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH: "groups"
      # admins group -> full Grafana (server) admin; everyone else -> read-only Viewer
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'admins') && 'GrafanaAdmin' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
      # Signal delivery target (signal-cli-rest-api /v2/send) — consumed by the
      # provisioned "signal" contact point via $__env{} interpolation.
      SIGNAL_PHONE_NUMBER: "${SIGNAL_PHONE_NUMBER}"
      SIGNAL_TECH_ID: "${SIGNAL_TECH_ID}"
    hostname: grafana
    ipc: private
    mem_limit: 1G
    # Pin id.* to Traefik on the LAN so Grafana's OIDC back-channel calls (token,
    # userinfo, JWKS) never depend on external DNS / NAT-reflection — same rationale
    # as the WUD stack. Without this, OIDC login can fail intermittently after a
    # restart.
    extra_hosts:
      - "id.${DOMAIN_NAME}:10.10.1.13"
    networks:
      - monitoring
      - traefik
    # Raw API port for machine-to-machine clients that can't reach the internal
    # `monitoring` network (i.e. LAN devices / other hosts). The browser UI goes
    # through grafana.${DOMAIN_NAME} with OIDC SSO; this port carries no separate
    # auth bypass because Grafana authenticates every request itself — API
    # clients must present a service-account token (same model as mcp-grafana).
    # Only reachable on the LAN (pfSense does not forward 3003).
    ports:
      - "3003:3000/tcp"
    volumes:
      - /opt/docker/grafana-prometheus/grafana_storage:/var/lib/grafana
      - /opt/docker/grafana-prometheus/grafana_provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - /opt/docker/grafana-prometheus/grafana_provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - /opt/docker/grafana-prometheus/grafana_provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\"\\s*:\\s*\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.display.name: "Grafana"
      wud.display.icon: "si:grafana"
      wud.link.template: 'https://github.com/grafana/grafana/releases/tag/v$${major}.$${minor}.$${patch}'
      # --- Traefik router (TLS, NO forward-auth: Grafana drives its own OIDC flow) ---
      traefik.enable: "true"
      traefik.docker.network: "traefik"
      traefik.http.routers.grafana.rule: "Host(`grafana.${DOMAIN_NAME}`)"
      traefik.http.routers.grafana.entrypoints: "websecure"
      traefik.http.routers.grafana.tls: "true"
      traefik.http.routers.grafana.tls.certresolver: "letsencrypt"
      traefik.http.routers.grafana.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.grafana.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.grafana.middlewares: "secHeaders@file,lan-only@file"
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
      homepage.group: "Infrastructure"
      homepage.name: "Grafana"
      homepage.icon: "grafana.png"
      homepage.href: "https://grafana.${DOMAIN_NAME}"
      # siteMonitor + widget are server-side calls from the Homepage backends; keep
      # them on the internal monitoring network so they bypass the lan-only-gated
      # Traefik route (which would 403 a container-sourced request). href stays
      # public for the browser link.
      homepage.siteMonitor: "http://grafana:3000/api/health"
      homepage.description: "Monitoring dashboards"
      homepage.weight: 0
      homepage.widget.type: "grafana"
      homepage.widget.url: "http://grafana:3000"
      homepage.widget.username: "admin"
      homepage.widget.password: "${GRAFANA_PASSWORD}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    container_name: prometheus
    image: *prometheus-version
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-otlp-receiver'
      - '--web.enable-remote-write-receiver'
    environment:
      TZ: "${TZ}"
    hostname: prometheus
    ipc: private
    mem_limit: 4g
    networks:
      - monitoring
    ports:
      - "9090:9090/tcp"
    volumes:
      - /opt/docker/grafana-prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/docker/grafana-prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - /opt/docker/grafana-prometheus/prometheus_storage:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy | grep -q 'Prometheus Server is Healthy'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.display.name: "Prometheus"
      wud.display.icon: "si:prometheus"
      wud.link.template: 'https://github.com/prometheus/prometheus/releases/tag/v$${major}.$${minor}.$${patch}'
      homepage.group: "Infrastructure"
      homepage.name: "Prometheus"
      homepage.icon: "prometheus.png"
      homepage.href: "http://10.10.1.13:9090"
      homepage.siteMonitor: "http://10.10.1.13:9090/-/healthy"
      homepage.description: "Metrics Scraper"
      homepage.weight: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    container_name: node-exporter
    image: *node-exporter-version
    restart: unless-stopped
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/containers|var/lib/docker/overlay2|run/docker/netns/.+)($$|/)'
      - '--collector.netclass.ignored-devices=^(veth.*|br-.*|docker.*|lo)$$'
      - '--collector.netdev.device-exclude=^(veth.*|br-.*|docker.*|lo)$$'
    environment:
      TZ: "${TZ}"
    hostname: node-exporter
    ipc: private
    mem_limit: 128M
    networks:
      - monitoring
    ports: []
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
      - /run/udev/data:/run/udev/data:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9100/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.display.name: "Node Exporter"
      wud.display.icon: "si:prometheus"
      wud.link.template: 'https://github.com/prometheus/node_exporter/releases/tag/$${major}.$${minor}.$${patch}'
      homepage.group: "Infrastructure"
      homepage.name: "Node Exporter"
      homepage.icon: "linux.png"
      homepage.description: "Host Metrics"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  cadvisor:
    container_name: cadvisor
    image: *cadvisor-version
    restart: unless-stopped
    command:
      - --housekeeping_interval=120s
      - --docker_only=true
      - --disable_metrics=percpu,hugetlb,referenced_memory,cpu_topology,resctrl,udp,advtcp
      - --store_container_labels=false
      - --event_storage_age_limit=default=0
      - --event_storage_event_limit=default=0
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: "${TZ}"
    hostname: cadvisor
    ipc: private
    networks:
      - monitoring
    ports: []
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz | grep -q 'ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.display.name: "cAdvisor"
      wud.display.icon: "si:docker"
      wud.link.template: 'https://github.com/google/cadvisor/releases/tag/$${major}.$${minor}.$${patch}'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    mem_limit: 1g

  dcgm-exporter:
    container_name: dcgm-exporter
    image: *dcgm-exporter-version
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    runtime: nvidia
    environment:
      TZ: "${TZ}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    hostname: dcgm-exporter
    ipc: private
    mem_limit: 1G
    networks:
      - monitoring
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+-\d+\.\d+\.\d+-distroless$'
      wud.display.name: "DCGM Exporter"
      wud.display.icon: "si:nvidia"
      homepage.group: "Infrastructure"
      homepage.name: "DCGM Exporter"
      homepage.icon: "si:nvidia"
      homepage.description: "GPU Metrics"              
    ports: []
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9400/metrics | grep -q 'DCGM'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  blackbox-exporter:
    container_name: blackbox-exporter
    image: *blackbox-exporter-version
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_RAW  # Required for ICMP/ping probes
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: "${TZ}"
    hostname: blackbox-exporter
    ipc: private
    mem_limit: 128M
    networks:
      - monitoring
    ports: []
    volumes:
      - /opt/docker/grafana-prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9115/metrics | grep -q 'blackbox_exporter_version'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.display.name: "Blackbox Exporter"
      wud.display.icon: "si:prometheus"
      wud.link.template: 'https://github.com/prometheus/blackbox_exporter/releases/tag/v$${major}.$${minor}.$${patch}'
      homepage.group: "Infrastructure"
      homepage.name: "Blackbox"
      homepage.icon: "prometheus.png"
      homepage.description: "Endpoint Probing"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  snmp-exporter:
    container_name: snmp-exporter
    image: *snmp-exporter-version
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: "${TZ}"
    hostname: snmp-exporter
    ipc: private
    mem_limit: 128M
    networks:
      - monitoring
    ports: []
    volumes:
      - /opt/docker/grafana-prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9116/-/healthy | grep -q 'Healthy'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.display.name: "SNMP Exporter"
      wud.display.icon: "si:prometheus"
      wud.link.template: 'https://github.com/prometheus/snmp_exporter/releases/tag/v$${major}.$${minor}.$${patch}'
      homepage.group: "Infrastructure"
      homepage.name: "SNMP Exporter"
      homepage.icon: "prometheus.png"
      homepage.description: "SNMP polling (switch, pfSense, iDRAC)"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  mcp-grafana:
    container_name: mcp-grafana
    image: *mcp-grafana-version
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    command: 
      - "-debug"
      - "--transport"
      - "streamable-http"
      - "--address"
      - ":5133"
      - "--enabled-tools"
      - "search,dashboard,datasources,prometheus,loki,alerting,annotations,navigation"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GRAFANA_URL: "http://grafana:3000" 
      GRAFANA_SERVICE_ACCOUNT_TOKEN: "${GRAFANA_MCP_TOKEN}" 
      TZ: "${TZ}"
    expose:
      - 5133
    ports:
      - 5133:5133/tcp
    hostname: mcp-grafana
    ipc: private
    mem_limit: 256M
    networks:
      - monitoring
      - openwebui
    healthcheck:
      test: ["CMD", "echo -e 'GET /healthz HTTP/1.0\r\nHost: localhost\r\n\r\n' > /dev/tcp/localhost/5133"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      wud.watch: "true"
      wud.tag.include: 'latest'
      wud.display.name: "Grafana MCP"
      wud.display.icon: "si:grafana"
      homepage.group: "Infrastructure"
      homepage.name: "Grafana MCP"
      homepage.icon: "grafana.png"
      homepage.description: "AI Context Server"
      homepage.weight: 10
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Home Assistant Bluetooth exporter — subscribes to the HA WebSocket
  # bluetooth advertisement + connection-allocation streams and exposes them
  # as Prometheus metrics (the per-device×proxy RSSI map, advert rate, and
  # per-proxy connection slots — none of which come through HA's filtered
  # /api/prometheus export). Locally-built image (see ./ha-bt-exporter +
  # builds.toml); WUD can't track a local tag so watch is off.
  ha-bluetooth-exporter:
    container_name: ha-bluetooth-exporter
    # Built by Compose from ./ha-bt-exporter at deploy time (the Dockerfile +
    # exporter.py are committed, so they're in the stack clone). image: just
    # pins the local tag; pull_policy:never stops the stack-wide `compose pull`
    # from trying to fetch this non-registry image and aborting the deploy.
    build:
      context: ./ha-bt-exporter
      dockerfile: Dockerfile
    image: ha-bluetooth-exporter:latest
    pull_policy: never
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: "${TZ}"
      HA_WS_URL: "ws://10.10.1.11:8123/api/websocket"
      HA_TOKEN: "${PROMETHEUS_HASS_TOKEN}"
      # Cardinality guard: drop a (device × proxy) series after this many
      # seconds with no advert (bounds BLE MAC-rotation churn).
      DEVICE_TTL_SECONDS: "300"
      # Optional knobs (left at defaults): ADDRESS_INCLUDE_REGEX, CONNECTABLE_ONLY,
      # LOG_ADVERTS (stdout→Loki, off — noisy), LOG_LEVEL.
    hostname: ha-bluetooth-exporter
    ipc: private
    mem_limit: 128M
    networks:
      - monitoring
    ports: []
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request;urllib.request.urlopen('http://127.0.0.1:9110/metrics')\""
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      wud.watch: "false"
      homepage.group: "Infrastructure"
      homepage.name: "HA Bluetooth Exporter"
      homepage.icon: "mdi:bluetooth"
      homepage.description: "HA BLE advert/RSSI metrics"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  monitoring:
    name: monitoring
    driver: bridge
    external: false
    ipam:
      config:
        - subnet: 10.56.0.0/16
  openwebui:
    name: openwebui
    external: true
  traefik:
    name: traefik
    external: true
