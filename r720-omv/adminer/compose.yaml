x-versions:
  adminer: &adminer-version "adminer:5.4.2"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  adminer:
    image: *adminer-version
    container_name: adminer
    hostname: adminer
    ipc: private
    restart: unless-stopped
    user: adminer
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256M
    command: ['php','-S','[::]:8080','-t','/var/www/html']
    entrypoint: ['entrypoint.sh','docker-php-entrypoint']
    working_dir: /var/www/html
    ports:
      - 9009:8080/tcp
    networks:
      - adminer
    logging: *default-logging
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Adminer"
      homepage.icon: "sh-adminer.png"
      homepage.href: "http://10.10.1.13:9009/"
      homepage.description: "Database management via UI"
      homepage.siteMonitor: "http://10.10.1.13:9009/"
      wud.display.name: "Adminer"
      wud.display.icon: "sh:adminer"
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/vrana/adminer/releases/tag/v$${major}.$${minor}.$${patch}"

networks:
  adminer:
    name: adminer
    driver: bridge
    external: false
