x-versions:
  pinchflat: &pinchflat-version "ghcr.io/kieraneglin/pinchflat:latest"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  pinchflat:
    image: *pinchflat-version
    container_name: pinchflat
    hostname: pinchflat
    ipc: private
    restart: unless-stopped
    user: "${MEDIA_PUID}:${MEDIA_PGID}"
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1G
    environment:
      TZ: "${TZ}"
    ports:
      - '8945:8945'
    volumes:
      - /opt/docker/pinchflat/pinchflat_config:/config
      - /Data/IT/pinchflat_downloads:/downloads
    networks:
      - pinchflat
    logging: *default-logging
    labels:
      homepage.group: "Media"
      homepage.name: "Pinchflat"
      homepage.icon: "sh-pinchflat.png"
      homepage.href: "http://10.10.1.13:8945"
      homepage.siteMonitor: "http://10.10.1.13:8945"
      wud.watch: 'true'
      wud.display.icon: 'sh-pinchflat'
      wud.display.name: 'Pinchflat'
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/kieraneglin/pinchflat/releases/tag/v$${major}.$${minor}.$${patch}'

networks:
  pinchflat:
    name: pinchflat
    driver: bridge
    external: false
