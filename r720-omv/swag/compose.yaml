x-versions:
  swag: &swag-version "lscr.io/linuxserver/swag:latest"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  swag:
    image: *swag-version
    container_name: swag
    hostname: swag
    ipc: private
    restart: unless-stopped
    entrypoint: ['/init']
    working_dir: /
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      DNSPLUGIN: "cloudflare"
      EMAIL: "${ADMIN_EMAIL}"
      MAXMINDDB_LICENSE_KEY: "${SWAG_MAXMINDB_KEY}"
      ONLY_SUBDOMAINS: "true"
      SUBDOMAINS: "home,cctv,ttrss,calibre,grocery,avocado,books,photos,projects,spellcheck,filebrowser,finance,music,baby,monica,nc,id,edr,rss,ai,cdn,auto,traces,recipes,bookmarks,nc,fp,jf,search,prices"
      TZ: "${TZ}"
      URL: "${DOMAIN_NAME}"
      VALIDATION: "dns"
      PROPAGATION: "80"
      DOCKER_MODS: "linuxserver/mods:swag-dashboard"
    ports:
      - 443:443/tcp
      - 80:80/tcp
      - 82:81/tcp
    volumes:
      - /Data/IT/cdn:/cdn:ro
      - /opt/docker/swag/swag_config:/config
    networks:
      - swag
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.display.name: "SWAG"
      wud.display.icon: "sh:swag"

networks:
  swag:
    name: swag
    external: false
    driver: bridge
