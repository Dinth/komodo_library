x-versions:
  mariadb: &mariadb-version "linuxserver/mariadb:11.4.8"
  monica: &monica-version "monica:4.1.2-apache"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  monica-mariadb:
    image: *mariadb-version
    container_name: monica-mariadb
    hostname: monica-mariadb
    ipc: private
    restart: unless-stopped
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
        reservations:
          memory: 512m
    environment:
      MYSQL_DIR: "/config"
      DATADIR: "/config/databases"
      MYSQL_ROOT_PASSWORD: "${MONICA_DB_PASS}"
      MYSQL_DATABASE: "monica"
      MYSQL_USER: "monica"
      MYSQL_PASSWORD: "${MONICA_DB_PASS}"
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
      TZ: "${TZ}"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --protocol=tcp || exit 1"]
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - /opt/docker/monica/mariadb_data:/config
    networks:
      - monica
      - adminer
    logging: *default-logging
    labels:
      wud.display.name: "Monica - MariaDB"
      wud.display.icon: "sh-monica"
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/MariaDB/server/releases/tag/mariadb-$${major}.$${minor}.$${patch}'

  monica:
    image: *monica-version
    container_name: monica
    hostname: monica
    ipc: private
    restart: unless-stopped
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      APP_KEY: "${MONICA_APP_KEY}"
      DB_HOST: "monica-mariadb"
      DB_USERNAME: "monica"
      DB_PASSWORD: "${MONICA_DB_PASS}"
      APP_URL: "https://monica.${DOMAIN_NAME}"
      APP_TRUSTED_PROXIES: "*"
    depends_on:
      monica-mariadb:
        condition: service_healthy
    ports:
      - 5435:80
    volumes:
      - /opt/docker/monica/monica_data:/var/www/html/storage
    networks:
      - monica
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      traefik.http.routers.monica.rule: "Host(`monica.${DOMAIN_NAME}`)"
      traefik.http.routers.monica.entrypoints: "websecure"
      traefik.http.routers.monica.tls: "true"
      traefik.http.routers.monica.tls.certresolver: "letsencrypt"
      traefik.http.routers.monica.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.monica.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.monica.middlewares: "secHeaders@file"
      traefik.http.services.monica.loadbalancer.server.port: "80"
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+-apache$$'
      wud.display.name: "Monica"
      wud.display.icon: "sh:monica"
      wud.link.template: "https://github.com/monicahq/monica/releases/tag/v$${major}.$${minor}.$${patch}"
      homepage.group: "Home"
      homepage.name: "Monica"
      homepage.icon: "sh:monica"
      homepage.href: "https://monica.${DOMAIN_NAME}"
      homepage.description: "Personal CRM"
      homepage.siteMonitor: "https://monica.${DOMAIN_NAME}"

networks:
  monica:
    name: monica
    driver: bridge
    external: false
  adminer:
    external: true
  traefik:
    external: true
