x-versions:
  ebusd: &ebusd-version "john30/ebusd:v26.1"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  ebusd:
    image: *ebusd-version
    container_name: ebusd
    hostname: ebusd
    ipc: private
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128M
    environment:
      EBUSD_MQTTINT: "/etc/ebusd/mqtt-hassio.cfg"
      EBUSD_MQTTJSON: "true"
      EBUSD_FOREGROUND: ""
      EBUSD_MQTTHOST: "10.10.1.11"
      EBUSD_MQTTPORT: "1883"
      EBUSD_MQTTCLIENTID: "ebusd"
      # NOTE: --mqttvar only parses a single NAME=VALUE assignment (a comma is
      # NOT a separator), so only filter-direction lives here. The widened
      # filter-name whitelist (flame, pressure, statenumber, fanspeed, fuel, ...)
      # is set directly in /opt/docker/ebusd/ebusd_data/mqtt-hassio.cfg.
      EBUSD_MQTTVAR: "filter-direction=r|u|^w"
      # Retain data topics so entity states survive HA restarts (most ebusd
      # messages are polled slowly; without retain they sit "unknown" for hours).
      EBUSD_MQTTRETAIN: ""
      EBUSD_MQTTLOG: ""
      EBUSD_ACCESSLEVEL: "*"
      EBUSD_SCANCONFIG: ""
      EBUSD_POLLINTERVAL: "10"
      EBUSD_DEVICE: "ens:10.10.25.8:9999"
      EBUSD_MQTTUSER: "${EBUSD_MQTTUSER}"
      EBUSD_MQTTPASS: "${EBUSD_MQTTPASS}"
    healthcheck:
      test: ["CMD", "ebusctl", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - /opt/docker/ebusd/ebusd_data:/etc/ebusd
    networks:
      - ebusd
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.display.icon: "sh-ebusd"
      wud.display.name: "Ebusd"
      wud.tag.include: '^v\d+\.\d$'
      wud.link.template: "https://github.com/john30/ebusd/releases/tag/v$${major}.$${minor}"

networks:
  ebusd:
    name: ebusd
    driver: bridge
    external: false
