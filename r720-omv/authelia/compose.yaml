x-versions:
  authelia: &authelia-version "authelia/authelia:4.39.16"
  valkey: &valkey-version "docker.io/valkey/valkey:8.1.3-alpine"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  authelia:
    image: *authelia-version
    container_name: authelia
    ipc: private
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    security_opt:
      - no-new-privileges:true
    mem_limit: 256M
    environment:
      TZ: "${TZ}"
      REDIS_PASSWORD: "${AUTHELIA_REDIS_PASS}"
      DOMAIN_NAME: "${DOMAIN_NAME}"
      SESSION_ENCRYPTION_KEY: "${AUTHELIA_SESSION_KEY}"
      STORAGE_ENCRYPTION_KEY: "${AUTHELIA_STORAGE_KEY}"
      AUTHELIA_STORAGE_LOCAL_PATH: "/config/db.sqlite3"
      AUTHELIA_SESSION_REDIS_HOST: authelia-valkey
      AUTHELIA_SESSION_REDIS_PORT: 6379
      X_AUTHELIA_CONFIG_FILTERS: "template"
    volumes:
      - /opt/docker/authelia/authelia_config:/config
    depends_on:
      - authelia-valkey
    networks:
      - authelia
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      # --- Router for CF Access authenticated users (WARP org) - gets trusted IP ---
      traefik.http.routers.authelia-cfaccess.rule: "Host(`id.${DOMAIN_NAME}`) && HeaderRegexp(`Cf-Access-Jwt-Assertion`, `.+`)"
      traefik.http.routers.authelia-cfaccess.priority: "110"
      traefik.http.routers.authelia-cfaccess.entrypoints: "websecure"
      traefik.http.routers.authelia-cfaccess.tls: "true"
      traefik.http.routers.authelia-cfaccess.tls.certresolver: "letsencrypt"
      traefik.http.routers.authelia-cfaccess.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.authelia-cfaccess.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.authelia-cfaccess.middlewares: "cf-access-auth@file,set-cfaccess-trusted-ip@file,secHeaders@file"
      traefik.http.routers.authelia-cfaccess.service: "authelia"
      # --- Default router for the Authelia Portal ---
      traefik.http.routers.authelia.rule: "Host(`id.${DOMAIN_NAME}`)"
      traefik.http.routers.authelia.priority: "100"
      traefik.http.routers.authelia.entrypoints: "websecure"
      traefik.http.routers.authelia.tls: "true"
      traefik.http.routers.authelia.tls.certresolver: "letsencrypt"
      traefik.http.routers.authelia.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.authelia.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.authelia.middlewares: "cloudflarewarp@file,secHeaders@file"
      traefik.http.services.authelia.loadbalancer.server.port: "9091"
      # --- Middleware for other services to use for authentication ---
      traefik.http.middlewares.authelia-auth.forwardauth.address: "http://authelia:9091/api/verify?rd=https://id.${DOMAIN_NAME}/"
      traefik.http.middlewares.authelia-auth.forwardauth.trustForwardHeader: "true"
      traefik.http.middlewares.authelia-auth.forwardauth.authRequestHeaders: "Cookie,X-Forwarded-For,X-Forwarded-Proto,X-Forwarded-Host,X-Forwarded-Uri,X-Forwarded-Method,X-Real-Ip"
      traefik.http.middlewares.authelia-auth.forwardauth.authResponseHeaders: "Remote-User, Remote-Groups, Remote-Name, Remote-Email"
      # --- Whats up Docker? config ---
      wud.watch: "true"
      wud.display.name: "Authelia"
      wud.display.icon: sh-authelia
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/authelia/authelia/releases/tag/v$${major}.$${minor}.$${patch}'

  authelia-valkey:
    image: *valkey-version
    container_name: authelia-valkey
    ipc: private
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    security_opt:
      - no-new-privileges:true
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - CHOWN
    cap_drop:
      - ALL
    mem_limit: 128M
    command: ['valkey-server', '--save', '30', '1', '--loglevel', 'warning', '--stop-writes-on-bgsave-error', 'no']
    healthcheck:
      test: '[ $$(valkey-cli ping) = ''PONG'' ]'
      start_period: 5s
      timeout: 3s
      interval: 1s
      retries: 5
    volumes:
      - /opt/docker/authelia/valkey-data:/data
    networks:
      - authelia
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    labels:
      wud.display.name: "Authelia - Valkey"
      wud.display.icon: "sh-authelia"
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/valkey-io/valkey/releases/tag/$${major}.$${minor}.$${patch}'

networks:
  authelia:
    name: authelia
    driver: bridge
    external: false
  traefik:
    external: true
