x-versions:
  komodo-core: &komodo-core-version "ghcr.io/moghtech/komodo-core:1.19.5"
  mongo: &mongo-version "mongo:8.2.5"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongo:
    image: *mongo-version
    container_name: komodo-mongo
    hostname: komodo-mongo
    ipc: private
    restart: unless-stopped
    command: --quiet --wiredTigerCacheSizeGB 0.25
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${KOMODO_DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${KOMODO_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - /opt/docker/komodo/mongo_data:/data/db
      - /opt/docker/komodo/mongo_config:/data/configdb
    logging: *default-logging
    labels:
      komodo.skip:
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/mongodb/mongo/releases/tag/r$${major}.$${minor}.$${patch}'
      wud.display.name: 'Komodo Mongo DB'
      wud.display.icon: 'sh:komodo'

  core:
    image: *komodo-core-version
    container_name: komodo-core
    hostname: komodo-core
    ipc: private
    restart: unless-stopped
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    depends_on:
      - mongo
    environment:
      TZ: "${TZ}"
      KOMODO_DATABASE_ADDRESS: "mongo:27017"
      KOMODO_DATABASE_USERNAME: "${KOMODO_DB_USERNAME}"
      KOMODO_DATABASE_PASSWORD: "${KOMODO_DB_PASSWORD}"
      COMPOSE_KOMODO_IMAGE_TAG: "latest"
      COMPOSE_LOGGING_DRIVER: "local"
      KOMODO_DB_USERNAME: "${KOMODO_DB_USERNAME}"
      KOMODO_HOST: "http://10.10.1.13"
      KOMODO_TITLE: "Komodo"
      KOMODO_FIRST_SERVER: "https://host.docker.internal:8120"
      KOMODO_DISABLE_CONFIRM_DIALOG: "true"
      KOMODO_MONITORING_INTERVAL: "15-sec"
      KOMODO_RESOURCE_POLL_INTERVAL: "5-min"
      KOMODO_LOCAL_AUTH: "true"
      KOMODO_DISABLE_USER_REGISTRATION: "false"
      KOMODO_ENABLE_NEW_USERS: "false"
      KOMODO_DISABLE_NON_ADMIN_CREATE: "false"
      KOMODO_TRANSPARENT_MODE: "false"
      KOMODO_JWT_TTL: "1-day"
      KOMODO_OIDC_ENABLED: "false"
      KOMODO_GITHUB_OAUTH_ENABLED: "false"
      KOMODO_GOOGLE_OAUTH_ENABLED: "false"
      KOMODO_AWS_ACCESS_KEY_ID: ""
      KOMODO_AWS_SECRET_ACCESS_KEY: ""
      KOMODO_HETZNER_TOKEN: ""
    ports:
      - 9120:9120
    volumes:
      - /opt/docker/komodo/komodo_syncs:/syncs
      - /opt/docker/komodo/core.config.toml:/config/config.toml
    extra_hosts:
      - host.docker.internal:host-gateway
    logging: *default-logging
    labels:
      komodo.skip:
      wud.watch: "true"
      wud.tag.include: '^v?\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/moghtech/komodo/releases/tag/v$${major}.$${minor}.$${patch}'
      wud.display.name: 'Komodo'
      wud.display.icon: 'sh:komodo'
