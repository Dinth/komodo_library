x-versions:
  grocy: &grocy-version "linuxserver/grocy:4.6.0"
  grocy-mcp: &grocy-mcp-version "ghcr.io/saya6k/mcp-grocy-api:1.4.13"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  grocy:
    image: *grocy-version
    container_name: grocy
    hostname: grocy
    ipc: private
    restart: unless-stopped
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - MKNOD
      - NET_BIND_SERVICE
      - NET_RAW
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      TZ: "${TZ}"
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
    ports:
      - 9283:80/tcp
    volumes:
      - /opt/docker/grocy/grocy_data:/config
    networks:
      - grocy
      - traefik
    logging: *default-logging
    labels:
      traefik.enable: "true"
      traefik.http.routers.grocy.rule: "Host(`grocery.${DOMAIN_NAME}`)"
      traefik.http.routers.grocy.entrypoints: "websecure"
      traefik.http.routers.grocy.tls: "true"
      traefik.http.routers.grocy.tls.certresolver: "letsencrypt"
      traefik.http.routers.grocy.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.grocy.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.grocy.middlewares: "secHeaders@file"
      traefik.http.services.grocy.loadbalancer.server.port: "80"
      homepage.group: "Home"
      homepage.name: "Grocy"
      homepage.icon: "sh-grocy.png"
      homepage.href: "https://grocery.${DOMAIN_NAME}"
      homepage.description: "Home stock and inventory management"
      homepage.siteMonitor: "https://grocery.${DOMAIN_NAME}"
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/grocy/grocy/releases/tag/v$${major}.$${minor}.$${patch}"
      wud.display.name: 'Grocy'
      wud.display.icon: 'sh:grocy'

  grocy-mcp:
    image: *grocy-mcp-version
    container_name: grocy-mcp
    hostname: grocy-mcp
    depends_on:
      - grocy
    ipc: private
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    mem_limit: 256M
    command: ["node", "build/index.js"]
    environment:
      TZ: "${TZ}"
      GROCY_BASE_URL: "http://grocy:80"
      GROCY_APIKEY_VALUE: "${GROCY_MCP_API_KEY}"
      GROCY_ENABLE_SSL_VERIFY: "false"
      ENABLE_HTTP_SERVER: "true"
      HTTP_SERVER_PORT: "8080"
      REST_RESPONSE_SIZE_LIMIT: "10mb"
    ports:
      - 5135:8080/tcp
    networks:
      - grocy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--tries=1", "--timeout=5", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/saya6k/mcp-grocy-api/releases/tag/v$${major}.$${minor}.$${patch}"
      wud.display.name: 'Grocy MCP'
      wud.display.icon: 'sh:grocy'

networks:
  grocy:
    name: grocy
    driver: bridge
    external: false
  traefik:
    external: true
