x-versions:
  duplicati: &duplicati-version "duplicati/duplicati:2.1.2.0"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  duplicati:
    image: *duplicati-version
    ipc: private
    restart: unless-stopped
    user: "${DOCKER_PUID}:${DOCKER_PGID}"
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1G
    environment:
      TZ: "${TZ}"
      DUPLICATI__DISABLE_DB_ENCRYPTION: "true"
      DUPLICATI__WEBSERVICE_PASSWORD: "${DUPLICATI_ADMIN_PASS}"
    ports:
      - "8200:8200/tcp"
    volumes:
      - /opt/docker/duplicati/duplicati_data:/data
      - /Data/IT/Backups:/backups
      - /opt/docker:/source:ro
    networks:
      - duplicati
    logging: *default-logging

networks:
  duplicati:
    name: duplicati
    driver: bridge
    external: false
