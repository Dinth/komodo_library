x-versions:
  boinc: &boinc-version "lscr.io/linuxserver/boinc:8.2.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  boinc:
    image: *boinc-version
    container_name: boinc
    ipc: private
    security_opt:
      - seccomp:unconfined #optional
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    environment:
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
      TZ: "${TZ}"
      PASSWORD: #optional
    volumes:
      - /opt/docker/boinc/boinc_config:/config
    ports:
      - 8080:8080
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4096M"
        reservations:
          memory: 128M
    restart: unless-stopped
    networks:
      - boinc
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^v?\d\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/BOINC/boinc/releases/tag/client_release%2F$${major}.$${minor}%2F$${major}.$${minor}.$${patch}'
      wud.display.name: 'BOINC'
      wud.display.icon: 'sh:boinc'
      homepage.group: "Infrastructure"
      homepage.name: "BOINC"
      homepage.icon: "sh:boinc"
      homepage.href: "http://10.10.1.13:8080"
      homepage.description: "Distributed computing"
      homepage.siteMonitor: "http://10.10.1.13:8080"

networks:
  boinc:
    driver: bridge
    name: boinc
    external: false
