x-versions:
  boinc: &boinc-version "lscr.io/linuxserver/boinc:8.2.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  boinc:
    image: *boinc-version
    container_name: boinc
    ipc: private
    security_opt:
      - seccomp:unconfined #optional
    cap_add:
      - AUDIT_WRITE
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - SETFCAP
      - SETGID
      - SETPCAP
      - SETUID
      - SYS_CHROOT
    cap_drop:
      - ALL
    environment:
      PUID: "${DOCKER_PUID}"
      PGID: "${DOCKER_PGID}"
      TZ: "${TZ}"
      PASSWORD: #optional
    volumes:
      - /opt/docker/boinc/boinc_config:/config
    # No host port publish: the linuxserver KasmVNC GUI refuses plain-HTTP access
    # from anything but localhost ("requires a secure connection"). It is reached
    # via the Traefik TLS route below (browser gets a secure context) instead.
    cpus: 4
    # Minimum scheduler weight: BOINC only gets CPU cycles no other cgroup
    # wants — true idle-priority crunching with zero impact on other services.
    # BOINC's own "suspend when CPU busy" pref is disabled (it reads HOST-wide
    # /proc/stat in a container, so it never ran); the kernel arbitrates instead.
    # cc_config.xml pins ncpus=4 so BOINC schedules only its actual quota.
    cpu_shares: 2
    mem_limit: 4G
    restart: unless-stopped
    networks:
      - boinc
      - traefik
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^v?\d\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/BOINC/boinc/releases/tag/client_release%2F$${major}.$${minor}%2F$${major}.$${minor}.$${patch}'
      wud.display.name: 'BOINC'
      wud.display.icon: 'sh:boinc'
      # KasmVNC web GUI behind Traefik TLS (provides the secure context the client
      # requires) + Authelia forward-auth + lan-only — it is a full remote desktop.
      traefik.enable: "true"
      traefik.docker.network: "traefik"
      traefik.http.routers.boinc.rule: "Host(`boinc.${DOMAIN_NAME}`)"
      traefik.http.routers.boinc.entrypoints: "websecure"
      traefik.http.routers.boinc.tls: "true"
      traefik.http.routers.boinc.tls.certresolver: "letsencrypt"
      traefik.http.routers.boinc.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.boinc.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.boinc.middlewares: "secHeaders@file,authelia-auth@docker,lan-only@file"
      traefik.http.services.boinc.loadbalancer.server.port: "8080"
      homepage.group: "Infrastructure"
      homepage.name: "BOINC"
      homepage.icon: "sh:boinc"
      homepage.href: "https://boinc.${DOMAIN_NAME}"
      homepage.description: "Distributed computing"
      homepage.siteMonitor: "https://boinc.${DOMAIN_NAME}"

networks:
  boinc:
    driver: bridge
    name: boinc
    external: false
  traefik:
    external: true
