x-versions:
  uptime-kuma: &uptime-kuma-version "louislam/uptime-kuma:2.2.0"
  socket-proxy: &socket-proxy-version "wollomatic/socket-proxy:1.11.3"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  uptime-kuma-socket-proxy:
    image: *socket-proxy-version
    container_name: uptime-kuma-socket-proxy
    hostname: uptime-kuma-socket-proxy
    ipc: private
    restart: unless-stopped
    read_only: true
    command:
      - '-loglevel=info'
      - '-allowfrom=uptime-kuma'
      - '-listenip=0.0.0.0'
      - '-allowGET=/(version|containers/.*|events.*)'
      - '-allowHEAD=/_ping'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
      - '-allowhealthcheck'
    user: "65534:${DOCKER_SOCKET_GID}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 64M
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    expose:
      - "2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - uptime-kuma
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - Uptime Kuma'
      wud.display.icon: 'mdi:connection'

  uptime-kuma:
    image: *uptime-kuma-version
    container_name: uptime-kuma
    hostname: uptime-kuma
    ipc: private
    restart: unless-stopped
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512M
    environment:
      TZ: "Europe/London"
    depends_on:
      uptime-kuma-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:3001 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - 3001:3001/tcp
    volumes:
      - /opt/docker/uptime-kuma/uptime-kuma_data:/app/data
    networks:
      - uptime-kuma
      - signal-rest-api
    logging: *default-logging
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Uptime-Kuma"
      homepage.icon: "uptime-kuma"
      homepage.href: "http://10.10.1.13:3001"
      homepage.siteMonitor: "http://10.10.1.13:3001"
      homepage.widget.type: "uptimekuma"
      homepage.widget.url: "http://uptime-kuma:3001"
      homepage.widget.slug: "dashboard"
      homepage.widget.fields: "['up', 'down', 'uptime', 'incident']"
      wud.watch: 'true'
      wud.display.icon: 'sh-uptime-kuma'
      wud.display.name: 'Uptime Kuma'
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/louislam/uptime-kuma/releases/tag/$${major}.$${minor}.$${patch}'

networks:
  uptime-kuma:
    name: uptime-kuma
    driver: bridge
    external: false
  signal-rest-api:
    external: true
