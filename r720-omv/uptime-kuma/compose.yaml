services:
  uptime-kuma-socket-proxy:
    image: wollomatic/socket-proxy:1.11.3
    container_name: uptime-kuma-socket-proxy
    ipc: private
    command:
      - '-loglevel=info'
      - '-allowfrom=uptime-kuma' # Fixed comment: allow only the uptime-kuma container
      - '-listenip=0.0.0.0'
      - '-allowGET=/(version|containers/.*|events.*)'
      - '-allowHEAD=/_ping'
      - '-watchdoginterval=1200'
      - '-stoponwatchdog'
      - '-shutdowngracetime=10'
    restart: unless-stopped
    read_only: true
    mem_limit: 64M
    expose:
      - "2375" # Explicitly documents the internal port for clarity
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 10s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    user: "65534:${DOCKER_SOCKET_GID}"
    labels:
      wud.watch: "true"
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: "https://github.com/wollomatic/socket-proxy/releases/tag/$${major}.$${minor}.$${patch}"
      wud.display.name: 'Docker Socket Proxy - Uptime Kuma'
      wud.display.icon: 'mdi:connection'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - uptime-kuma
      
  uptime-kuma:
    image: louislam/uptime-kuma:2.2.0
    container_name: uptime-kuma
    hostname: uptime-kuma
    ipc: private
    depends_on:
      uptime-kuma-socket-proxy:
        condition: service_healthy # Ensures the proxy is fully up before Kuma starts
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW # Required for ICMP/Ping monitors to work properly
      # - AUDIT_WRITE (See note below regarding capability bloat)
      # - CHOWN
      # - DAC_OVERRIDE
      # - FOWNER
      # - FSETID
      # - MKNOD
      # - SETFCAP
      # - SETGID
      # - SETPCAP
      # - SETUID
      # - SYS_CHROOT
    environment:
      - TZ=Europe/London # Ensures logs and cron schedules match your local time
    labels:
      homepage.group: "Infrastructure"
      homepage.name: "Uptime-Kuma"
      homepage.icon: "uptime-kuma"
      homepage.href: "http://10.10.1.13:3001"
      homepage.siteMonitor: "http://10.10.1.13:3001"
      homepage.widget.type: "uptimekuma"
      homepage.widget.url: "http://uptime-kuma:3001"
      homepage.widget.slug: "dashboard"
      homepage.widget.fields: "['up', 'down', 'uptime', 'incident']"
      wud.watch: 'true'
      wud.display.icon: 'sh-uptime-kuma'
      wud.display.name: 'Uptime Kuma'
      wud.tag.include: '^\d+\.\d+\.\d+$$'
      wud.link.template: 'https://github.com/louislam/uptime-kuma/releases/tag/$${major}.$${minor}.$${patch}'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: curl -f http://localhost:3001 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - uptime-kuma
      - signal-rest-api
    ports:
      - 3001:3001/tcp
    restart: unless-stopped
    volumes:
      - /opt/docker/uptime-kuma/uptime-kuma_data:/app/data

networks:
  uptime-kuma:
    name: uptime-kuma
    driver: bridge
    external: false
  signal-rest-api:
    external: true