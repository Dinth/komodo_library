[[build]]
name = "mcpmqtt"
tags = ["builds", "mcp-gateway"]
description = "Local image for tspspi/mcpMQTT — spawned as a stdio MCP server by mcp-gateway."
[build.config]
builder = "r720-omv"
git_provider = "github.com"
git_account = "michal@gawronskikot.com"
git_https = true
repo = "Dinth/komodo_library"
branch = "main"
build_path = "r720-omv/mcp-gateway/mcpmqtt"
dockerfile_path = "Dockerfile"
image_name = "mcpmqtt"
auto_increment_version = false
include_latest_tag = true
include_version_tags = false
include_commit_tag = false
webhook_enabled = true

