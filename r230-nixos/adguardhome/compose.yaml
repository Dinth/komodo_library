x-versions:
  adguardhome: &adguardhome-version "adguard/adguardhome:v0.108.0-b.84"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  adguardhome:
    image: *adguardhome-version
    container_name: adguardhome
    hostname: adguardhome
    ipc: private
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE  # bind privileged DNS port 53
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1G
    environment:
      TZ: "${TZ}"
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000/tcp" 
    healthcheck:
      test: ["CMD-SHELL", "nslookup -timeout=2 cloudflare.com 127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /opt/docker/adguardhome/adguardhome_work:/opt/adguardhome/work
      - /opt/docker/adguardhome/adguardhome_conf:/opt/adguardhome/conf
      - /etc/localtime:/etc/localtime:ro
    logging: *default-logging
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+-b\.\d+$$'
      wud.display.name: "AdGuard Home"
      wud.link.template: 'https://github.com/AdguardTeam/AdGuardHome/releases/tag/v$${major}.$${minor}.$${patch}-$${prerelease}'
